function CoordApp({user,data,update,onLogout,dismissAlert,isOnline}){
  const [page,setPage]=useState('list');
  const [selEntry,setSelEntry]=useState(null);
  const [selIsPermit,setSelIsPermit]=useState(false);

  const today=nowTs();
  const todayEntries=(data.schedule[user.id]||[]).filter(e=>String(e.dayOfWeek)===String(today.dayIndex));
  const todayVisits=data.visits.filter(v=>v.coordId===user.id&&v.date===today.date);

  // ── Poll for delivery notifications every 15s ──
  const [deliveryFlash,setDeliveryFlash]=useState(null);
  useEffect(()=>{
    const iv=setInterval(()=>{
      if(notifs.length===0)return;
      // Find notifications for my schedule entries
      const mine=notifs.filter(n=>todayEntries.some(e=>e.customerName===n.customerName));
      if(mine.length>0){
        setDeliveryFlash(mine[mine.length-1]);
        // Reload alerts
        // alerts will refresh on next poll cycle
      }
    },15000);
    return()=>clearInterval(iv);
  },[todayEntries]);

  // ── Proximity check: is distributor within 500m? ──
  const [distProxMsg,setDistProxMsg]=useState('');
  const checkDistProximity=useCallback((custName)=>{
    if(!data.settings?.proximityBlock||!supa)return Promise.resolve(false);
    const cutoff=new Date(Date.now()-180000).toISOString();
    return supa.from('gmd_dist_pos').select('*').gte('updated_ts',cutoff).then(({data:rows})=>{
      if(!rows||!rows.length)return false;
      const cust=data.customers.find(c=>c.name===custName);
      if(!cust||!cust.lat||!cust.lng)return false;
      for(let i=0;i<rows.length;i++){
        const dp=rows[i];
        const d=mDist(dp.lat,dp.lng,cust.lat,cust.lng);
        if(d<500){
          setDistProxMsg('الموزع في محيطك ('+Math.round(d)+'م) — انتظر قليلاً حتى يكمل التسليم');
          return true;
        }
      }
      return false;
    }).catch(function(){return false;});
  },[data]);
  const done=todayEntries.filter(e=>todayVisits.find(v=>v.scheduleId===e.id));
  const undone=todayEntries.filter(e=>!todayVisits.find(v=>v.scheduleId===e.id));

  // ── Smart priority sort ──
  const sortedUndone=useMemo(()=>{
    return [...undone].sort((a,b)=>getVisitPriority(a,data.orders)-getVisitPriority(b,data.orders));
  },[undone,data.orders]);

  // ── KPI: estimated finish time ──
  const kpiPct=todayEntries.length>0?Math.round(done.length/todayEntries.length*100):0;
  const avgMinPerVisit=30; // assume 30 min per visit
  const etaMinutes=undone.length*avgMinPerVisit;
  const etaTime=new Date();etaTime.setMinutes(etaTime.getMinutes()+etaMinutes);
  const etaStr=etaTime.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});

  if(page==='visit'&&selEntry){
    return <CoordVisit
      entry={selEntry} isPermit={selIsPermit}
      data={data} user={user} update={update}
      onBack={()=>{setPage('list');setSelEntry(null);setSelIsPermit(false);}}
    />;
  }

  return(
    <>
      <Header user={user} onLogout={onLogout} title="جدول زياراتي" isOnline={isOnline!==false}/>
      <AlertBanner alerts={data.alerts} userId={user.id} role={R.COORDINATOR} onDismiss={dismissAlert}/>
      <div style={G.sec}>

        {/* ── Delivery flash notification ── */}
        {deliveryFlash&&(
          <div style={{background:'#f0fdf4',border:'2px solid #22c55e',borderRadius:12,padding:'12px 16px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}} className="fade">
            <button onClick={()=>setDeliveryFlash(null)} style={{background:'rgba(34,197,94,.2)',border:'none',color:'#16a34a',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:12}}>✓</button>
            <div style={{textAlign:'right'}}>
              <div style={{color:'#16a34a',fontSize:13,fontWeight:700}}>تم التسليم!</div>
              <div style={{color:'#166534',fontSize:12}}>العميل {deliveryFlash.customerName} استلم بضاعته — نسّق الأصناف الجديدة</div>
            </div>
          </div>
        )}

        {/* ── KPI Dashboard ── */}
        <div style={{...G.card,marginBottom:14,background:'linear-gradient(135deg,#eff6ff,#f0f4f8)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{color:kpiPct>=100?'#16a34a':kpiPct>=60?'#d97706':'#dc2626',fontSize:26,fontWeight:800}}>{kpiPct}%</div>
            <div style={{textAlign:'right'}}>
              <div style={{color:'#1e293b',fontWeight:700}}>تم {done.length} من {todayEntries.length} زيارة</div>

        {todayEntries.length===0&&<Empty icon="📅" text={'لا توجد زيارات ليوم '+today.dayName}/>}

        {undone.length>0&&(

            <div style={{color:'#dc2626',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>
              ⏳ متبقية ({undone.length}) — مرتبة بالأولوية

            />)}
          </>
        )}
        {done.length>0&&(
          <>
            <div style={{color:'#16a34a',fontSize:13,fontWeight:700,textAlign:'right',marginTop:12,marginBottom:8}}>✅ تمت ({done.length})</div>
            {done.map(e=>{
              const v=todayVisits.find(x=>x.scheduleId===e.id);
              return(
                <div key={e.id} style={{...G.card,borderRight:'3px solid #22c55e'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{background:'rgba(34,197,94,.1)',borderRadius:8,padding:'6px 10px',textAlign:'center',flexShrink:0}}>

                      <div style={{fontSize:9,color:'#16a34a',marginTop:1}}>{v?.photos?.length||0} 📷</div>
                    </div>
                    <div style={{textAlign:'right',flex:1}}>
                      <div style={{color:'#1e293b',fontWeight:600,fontSize:14}}>{e.customerName}</div>
                      <div style={{color:v?.shopClosed?'#d97706':'#16a34a',fontSize:11,marginTop:2}}>
                        {v?.shopClosed?'🔒 محل مغلق':'✅'} · {v?.startTime} ← {v?.endTime}
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    </>
  );
}

// Single schedule entry card — smart priority + proximity logic
function CoordEntryCard({entry,data,user,update,onStart,onPermitGranted}){
  const cust=data.customers.find(c=>c.name===entry.customerName);
  const order=data.orders.find(o=>o.customerName===entry.customerName);
  const hasGps=!!(cust?.lat&&cust?.lng);
  const today=nowTs();
  const priority=getVisitPriority(entry,data.orders);
  const priorityColor=PRIORITY_COLORS[priority];
  const priorityLabel=PRIORITY_LABELS[priority];

  const myPerm=data.perms.find(p=>p.coordId===user.id&&p.customerName===entry.customerName&&p.requestedAt?.startsWith(today.date));
  const [reqSent,setReqSent]=useState(!!myPerm);
  const [permStatus,setPermStatus]=useState(myPerm?.status||'');
  const [checkingProx,setCheckingProx]=useState(false);

  useEffect(()=>{
    // الـ Realtime في App يحدّث data.perms — نراقب التغيير هنا
    const fp=data.perms.find(p=>p.coordId===user.id&&p.customerName===entry.customerName&&p.requestedAt?.startsWith(today.date));
    if(fp&&fp.status!==permStatus){
      setPermStatus(fp.status);
      if(fp.status==='approved')onPermitGranted();
    }
  },[data.perms]);

  const handlePermReq=()=>{
    if(data.settings&&data.settings.proximityBlock){
      setCheckingProx(true);
      checkDistProximity(entry.customerName).then(function(blocked){
        setCheckingProx(false);
        if(!blocked)sendReq();
      }).catch(function(){setCheckingProx(false);sendReq();});
    } else {
      sendReq();
    }
  };

  const sendReq=()=>{
    const n=nowTs();
    const isAfter4PM=new Date().getHours()>=16;
    // Auto-approve if after 4PM and setting enabled
    const autoStatus=data.settings?.autoApproveAfter16&&isAfter4PM?'approved':'pending';
    const req={id:uid(),coordId:user.id,coordName:user.name,customerName:entry.customerName,
      sysNum:cust?.sysNum||'',reason:'الطلبية لم تُسلَّم',requestedAt:n.date+' '+n.time,status:autoStatus};
    update('perms',[...data.perms,req]);
    setReqSent(true);setPermStatus(autoStatus);
    if(autoStatus==='approved')onPermitGranted();
  };

  const orderDelivered=order?.status===ST.DELIVERED;
  const orderFailed=order?.status===ST.FAILED;
  const orderExists=!!order;
  const needsPermission=orderExists&&!orderDelivered&&!orderFailed;

  // Priority badge color background
  const pBg=priority===1?'rgba(22,163,74,.08)':priority===2?'rgba(217,119,6,.08)':priority===3?'rgba(100,116,139,.06)':'rgba(100,116,139,.05)';

  return(
    <div style={{...G.card,borderRight:'3px solid '+priorityColor,marginBottom:10,background:pBg}}>
      <div style={{textAlign:'right',marginBottom:8}}>
        {/* Priority label */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
          <span style={{background:priorityColor+'22',color:priorityColor,fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,border:'1px solid '+priorityColor+'44'}}>{priorityLabel}</span>
          <div style={{color:'#1e293b',fontWeight:700,fontSize:15}}>{entry.customerName}</div>
        </div>
        {cust?.region&&<div style={{color:'#64748b',fontSize:12}}>{cust.region}{cust.sysNum?' · #'+cust.sysNum:''}</div>}
        {entry.visitTime&&<div style={{color:'#64748b',fontSize:12}}>🕐 {entry.visitTime}</div>}
        {!hasGps&&<div style={{color:'#d97706',fontSize:11,marginTop:3}}>⚠️ لم يُحدَّد موقع العميل</div>}

        {/* Order status */}
        {order&&(
          <div style={{marginTop:6,padding:'6px 10px',borderRadius:8,
            background:orderDelivered?'rgba(34,197,94,.08)':orderFailed?'rgba(245,158,11,.08)':'rgba(245,158,11,.08)',
            border:'1px solid '+(orderDelivered?'rgba(34,197,94,.2)':'rgba(245,158,11,.2)')}}>
            <div style={{fontSize:12,color:orderDelivered?'#16a34a':orderFailed?'#d97706':'#d97706',textAlign:'right',marginBottom:4}}>
              {orderDelivered?'✅ مُسلَّمة — نسّق فوراً':orderFailed?'🟠 رفض الاستلام — زر لترتيب الرفوف':'⏳ الطلبية في الطريق'}
            </div>
            <Badge status={order.status}/>
          </div>
        )}
        {!order&&<div style={{color:'#64748b',fontSize:11,marginTop:4}}>زيارة دورية — لا توجد طلبية اليوم</div>}
      </div>

      {/* Action buttons */}
      {!hasGps?(
        <div style={{color:'#d97706',fontSize:12,textAlign:'center',padding:'8px',background:'rgba(245,158,11,.06)',borderRadius:8}}>لا يمكن الدخول — الموقع غير محدد للمدير</div>
      ):checkingProx?(
        <div style={{color:'#2563eb',fontSize:13,textAlign:'center',padding:'8px',background:'rgba(37,99,235,.08)',borderRadius:8}} className="pulse">📡 فحص المسافة...</div>
      ):needsPermission?(
        reqSent?(
          permStatus==='approved'?(
            <button onClick={onPermitGranted} style={G.btn('#15803d')}>✅ تمت الموافقة — ادخل الآن</button>
          ):permStatus==='rejected'?(
            <div style={{color:'#dc2626',fontSize:13,textAlign:'center',padding:'8px',background:'rgba(239,68,68,.08)',borderRadius:8}}>✕ رفض المدير الطلب</div>
          ):(
            <div style={{color:'#d97706',fontSize:13,textAlign:'center',padding:'8px',background:'rgba(245,158,11,.08)',borderRadius:8}} className="pulse">
              ⏳ في انتظار موافقة المدير...
            </div>
          )
        ):(
          <button onClick={handlePermReq} style={G.btn('#b45309')}>⚡ طلب إذن من المدير</button>
        )
      ):(
        <button onClick={onStart} style={G.btn(orderDelivered?'#15803d':orderFailed?'#b45309':'#2563eb')}>
          {orderDelivered?'✅ ادخل — نسّق البضاعة الجديدة':orderFailed?'🟠 ادخل — رتّب البضاعة الموجودة':'دخول — بدء الزيارة ›'}
        </button>
      )}
    </div>
  );
}

// Visit page: full enhanced version
function CoordVisit({entry,isPermit,data,user,update,onBack}){
  const cust=data.customers.find(c=>c.name===entry.customerName);
  const order=data.orders.find(o=>o.customerName===entry.customerName);
  const [gpsOk,setGpsOk]=useState(false);
  const [photos,setPhotos]=useState([]);
  const [notes,setNotes]=useState('');
  const [saving,setSaving]=useState(false);
  const [camOpen,setCamOpen]=useState(false);
  const [done,setDone]=useState(false);
  const [shopClosed,setShopClosed]=useState(false);
  const [rejReason,setRejReason]=useState(''); // rejection reason if order failed
  const [showExpiry,setShowExpiry]=useState(false);
  const [expiryItems,setExpiryItems]=useState([{name:'',qty:'',expDate:''}]);
  const [timeChecked,setTimeChecked]=useState(false);
  const [timeOk,setTimeOk]=useState(true);
  const startTimeRef=useRef(null);

  // Record start time when GPS confirmed
  const onGpsOk=()=>{
    startTimeRef.current=nowTs().time;
    setGpsOk(true);
    window.auditLogDB(user.id,user.name,user.role,'visit_start',entry.customerName);
  };

  const handleCapture=async rawImg=>{
    setCamOpen(false);
    const n=nowTs();
    const stamped=await stampImg(rawImg,entry.customerName,'📅 '+n.date+' 🕐 '+n.time);
    setPhotos(p=>[...p,{img:stamped,time:n.time}]);
  };

  const addExpiryRow=()=>setExpiryItems([...expiryItems,{name:'',qty:'',expDate:''}]);
  const updateExpRow=(i,f,v)=>setExpiryItems(expiryItems.map((r,j)=>j===i?{...r,[f]:v}:r));

  const save=async()=>{
    // Verify server time to prevent cheating
    const serverOk=await checkServerTime();
    if(!serverOk){
      alert('تحذير: وقت هاتفك لا يتطابق مع الوقت الفعلي. يُرجى تصحيح وقت الجهاز.');
      return;
    }
    if(!shopClosed&&photos.length===0){
      alert('يجب التقاط صورة واحدة على الأقل لإتمام الزيارة.');
      return;
    }
    // ── AI photo verification ──
    if(!shopClosed&&photos.length>0){
      setSaving(true);
      try{
        const imgBase64=photos[0].img.split(',')[1];
        const aiResp=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'x-api-key':window.getApiKey(),
            'anthropic-version':'2023-06-01',
            'anthropic-dangerous-direct-browser-access':'true',
          },
          body:JSON.stringify({
            model:'claude-sonnet-4-20250514',
            max_tokens:100,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/jpeg',data:imgBase64}},
              {type:'text',text:'هل تظهر في هذه الصورة داخل متجر أو محل تجاري أو رفوف بضائع؟ أجب بـ "نعم" أو "لا" فقط.'}
            ]}]
          })
        });
        const aiData=await aiResp.json();
        const aiText=(aiData?.content?.[0]?.text||'').trim();
        const isStore=aiText.startsWith('نعم')||aiText.toLowerCase().startsWith('yes');
        if(!isStore){
          setSaving(false);
          if(!confirm('الذكاء الاصطناعي: الصورة لا تبدو داخل متجر. هل تريد المتابعة على أي حال؟'))return;
        }
      }catch(e){
        // If AI fails, continue normally
        console.warn('AI check failed:',e);
      }
      setSaving(false);
    }
    // For rejection order: require reason
    if(order?.status===ST.FAILED&&!rejReason.trim()){
      alert('يجب تعبئة سبب رفض الاستلام.');
      return;
    }
    setSaving(true);
    const n=nowTs();
    const vId=uid();
    // رفع الصور إلى Storage
    const uploadedPhotos=await Promise.all(photos.map(function(ph,i){return window.uploadPhoto(ph.img,vId,i);}));
    const visitObj={
      id:vId,scheduleId:entry.id,
      coordId:user.id,coordName:user.name,
      customerName:entry.customerName,sysNum:cust?.sysNum||'',
      date:n.date,startTime:startTimeRef.current,endTime:n.time,
      photos:uploadedPhotos.map(p=>p.url),
      photoPaths:uploadedPhotos.map(p=>p.path).filter(Boolean),
      photoTimes:photos.map(p=>p.time),
      notes,isPermissionVisit:!!isPermit,
      shopClosed,
      rejectionReason:order?.status===ST.FAILED?rejReason:'',
      orderStatus:order?.status||'none',
    };
    update('visits',[...data.visits,visitObj]);
    window.auditLogDB(user.id,user.name,user.role,'visit_end',entry.customerName+' ('+n.time+')');

    // Save expiry report if filled
    const validExpiry=expiryItems.filter(r=>r.name.trim()&&r.qty);
    if(validExpiry.length>0){
      const exRep={id:uid(),coordId:user.id,coordName:user.name,customerName:entry.customerName,
        items:validExpiry,reportedAt:n.date+' '+n.time,reportedISO:n.iso,action:'pending'};
      const newExp=[...(data.expiry||[]),exRep];
      update('expiry',newExp);
      // Send alert to admin
      const alertMsg='⚠️ تقرير انتهاء صلاحية\nعميل: '+entry.customerName+'\nالمنسق: '+user.name+'\n'+validExpiry.map(r=>r.name+' ('+r.qty+') ينتهي: '+r.expDate).join('\n');
      update('alerts',[...(data.alerts||[]),{id:uid(),message:alertMsg,target:'admin_only',createdAt:n.date+' '+n.time,createdISO:n.iso,createdBy:'النظام',autoType:'expiry',readBy:[],isSystem:true}]);
    }

    setSaving(false);setDone(true);
  };

  if(!gpsOk)return <GpsGate
    customer={cust||{name:entry.customerName,region:entry.region||'',sysNum:entry.sysNum||''}}
    onOk={onGpsOk} onBack={onBack} user={user}
    requireGps={!!(cust?.lat&&cust?.lng)}
  />;
  if(camOpen)return <LiveCamera onCapture={handleCapture} onClose={()=>setCamOpen(false)}/>;

  if(done)return(
    <div style={{...G.page,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:24,minHeight:'100vh'}}>
      <div style={{fontSize:70,marginBottom:12}}>{shopClosed?'🔒':'✅'}</div>
      <div style={{color:'#16a34a',fontSize:22,fontWeight:800}}>{shopClosed?'تم توثيق الإغلاق!':'تم تسجيل الزيارة!'}</div>
      <div style={{color:'#64748b',fontSize:13,marginTop:6}}>{photos.length} صورة · من {startTimeRef.current} إلى {nowTs().time}</div>
      <button onClick={onBack} style={{...G.btn(),maxWidth:250,marginTop:22}}>← العودة للجدول</button>
    </div>
  );

  const orderFailed=order?.status===ST.FAILED;

  return(
    <>
      <Header user={user} onBack={onBack} title={entry.customerName}/>
      <div style={G.sec}>
        {/* GPS + time confirmed */}
        <div style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'#16a34a',fontWeight:700}}>✅ موقعك مُتحقق</span>
          <span style={{color:'#166534',fontSize:12}}>بدأت: {startTimeRef.current}</span>
        </div>

        {/* Customer info */}
        <div style={{...G.card,marginBottom:12}}>
          <div style={{color:'#1e293b',fontWeight:700,fontSize:16,textAlign:'right'}}>{entry.customerName}</div>
          {cust?.region&&<div style={{color:'#64748b',fontSize:12,textAlign:'right',marginTop:2}}>{cust.region}{cust.sysNum?' · #'+cust.sysNum:''}</div>}
          {isPermit&&<div style={{color:'#d97706',fontSize:12,marginTop:4,textAlign:'right'}}>⚡ زيارة بإذن مدير</div>}
        </div>

        {/* Order status banner */}
        {order&&(
          <div style={{...G.card,marginBottom:12,background:order.status===ST.DELIVERED?'rgba(34,197,94,.06)':orderFailed?'rgba(245,158,11,.08)':'rgba(245,158,11,.06)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <Badge status={order.status}/>
              <div style={{textAlign:'right'}}>
                {order.status===ST.DELIVERED&&<div style={{color:'#16a34a',fontSize:12}}>نسّق البضاعة الجديدة</div>}
                {orderFailed&&<div style={{color:'#d97706',fontSize:12}}>رتّب البضاعة الموجودة على الرفوف</div>}
                {order.status===ST.IN_DELIVERY&&<div style={{color:'#d97706',fontSize:12}}>⏳ البضاعة في الطريق</div>}
              </div>
            </div>
          </div>
        )}

        {/* Rejection reason — mandatory if order failed */}
        {orderFailed&&(
          <div style={{...G.card,marginBottom:12,border:'1px solid rgba(245,158,11,.3)'}}>
            <div style={{color:'#d97706',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>⚠️ سبب رفض الاستلام (إجباري)</div>
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {['مشكلة في طريقة العرض / تراكم مخزون قديم','الطاقة الاستيعابية للرف ممتلئة','مشكلة في جودة المنتج','سبب آخر'].map(r=>(
                <button key={r} onClick={()=>setRejReason(r)} style={{background:rejReason===r?'rgba(245,158,11,.2)':'rgba(0,0,0,.02)',border:'1px solid '+(rejReason===r?'#d97706':'#1e293b'),borderRadius:8,padding:'8px 12px',color:rejReason===r?'#d97706':'#64748b',textAlign:'right',cursor:'pointer',fontSize:13}}>
                  {rejReason===r?'✓ ':''}{r}
                </button>
              ))}
              {rejReason==='سبب آخر'&&<textarea style={{...G.inp,minHeight:60,fontSize:13}} placeholder="اكتب السبب..." onChange={e=>setRejReason(e.target.value)}/>}
            </div>
          </div>
        )}

        {/* Shop closed button */}
        {!shopClosed?(
          <button onClick={()=>setShopClosed(true)} style={{...G.btn('rgba(239,68,68,.12)','#dc2626'),marginBottom:8,fontSize:13,padding:'10px',border:'1px solid rgba(239,68,68,.25)'}}>
            🔒 المحل مغلق — توثيق بصورة موقع
          </button>
        ):(
          <div style={{background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)',borderRadius:10,padding:'10px 14px',marginBottom:12}}>
            <div style={{color:'#dc2626',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:6}}>🔒 محل مغلق — يجب التقاط صورة للتوثيق</div>
            <button onClick={()=>setShopClosed(false)} style={{...G.bsm('rgba(100,116,139,.15)','#94a3b8')}}>إلغاء</button>
          </div>
        )}

        {/* Camera */}
        <button onClick={()=>setCamOpen(true)} style={{...G.btn('#7c3aed'),marginBottom:6}}>📷 التقاط صورة مباشرة</button>
        <div style={{color:'#64748b',fontSize:11,textAlign:'center',marginBottom:12}}>الصور مُختمة بالتاريخ والوقت واسم العميل</div>

        {photos.length>0&&(
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
            {photos.map((ph,i)=>(
              <div key={i} style={{borderRadius:10,overflow:'hidden',position:'relative',aspectRatio:'1'}}>
                <img src={ph.img} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
                <button onClick={()=>setPhotos(photos.filter((_,j)=>j!==i))} style={{position:'absolute',top:4,right:4,background:'rgba(239,68,68,.9)',border:'none',color:'white',borderRadius:'50%',width:22,height:22,cursor:'pointer',fontWeight:700,fontSize:13}}>×</button>
              </div>
            ))}
          </div>
        )}

        {/* Notes */}
        <div style={{marginBottom:10}}>
          <label style={G.lbl}>ملاحظات (اختياري)</label>
          <textarea style={{...G.inp,minHeight:70,resize:'vertical'}} placeholder="ما تم تنسيقه..." value={notes} onChange={e=>setNotes(e.target.value)}/>
        </div>

        {/* Expiry report — optional */}
        <button onClick={()=>setShowExpiry(!showExpiry)} style={{...G.btn(showExpiry?'#7c3aed':'rgba(124,58,237,.15)',showExpiry?'white':'#7c3aed'),marginBottom:10,fontSize:13,padding:'10px'}}>
          {showExpiry?'▲ إخفاء':'⚠️ إضافة تقرير انتهاء صلاحية'}
        </button>
        {showExpiry&&(
          <div style={{...G.card,marginBottom:12,border:'1px solid rgba(124,58,237,.3)'}}>
            <div style={{color:'#7c3aed',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:10}}>أصناف قرب انتهاء الصلاحية</div>
            {expiryItems.map((row,i)=>(
              <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 80px 110px 30px',gap:6,marginBottom:8,alignItems:'center'}}>
                <input style={{...G.inp,fontSize:12,padding:'7px 10px'}} placeholder="اسم الصنف" value={row.name} onChange={e=>updateExpRow(i,'name',e.target.value)}/>
                <input style={{...G.inp,fontSize:12,padding:'7px 8px'}} placeholder="كمية" type="number" value={row.qty} onChange={e=>updateExpRow(i,'qty',e.target.value)}/>
                <input style={{...G.inp,fontSize:12,padding:'7px 8px'}} type="date" value={row.expDate} onChange={e=>updateExpRow(i,'expDate',e.target.value)}/>
                <button onClick={()=>setExpiryItems(expiryItems.filter((_,j)=>j!==i))} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:18}}>×</button>
              </div>
            ))}
            <button onClick={addExpiryRow} style={{...G.bsm(),marginTop:4}}>+ إضافة صنف</button>
          </div>
        )}

        <button onClick={save} disabled={saving} style={{...G.btn('#15803d'),opacity:saving?0.6:1}}>
          {saving?'⏳ جاري الحفظ والتحقق...':'💾 إنهاء الزيارة وحفظها'}
        </button>
      </div>
    </>
  );
}

// SYSTEM SETTINGS
// ══════════════════════════════════════════
function SystemSettings({data,update,user}){
  const s=data.settings||{};
  const toggle=(key)=>update('settings',{...s,[key]:!s[key]});
  const [wipeConfirm,setWipeConfirm]=useState('');
  const [wipeTarget,setWipeTarget]=useState('');
  const [adminForm,setAdminForm]=useState({name:'',username:'',pass:'',pass2:''});
  const [adminMsg,setAdminMsg]=useState('');
  const [showAdminForm,setShowAdminForm]=useState(false);

  const saveAdminProfile=()=>{
    const{name,username,pass,pass2}=adminForm;
    if(!name.trim()||!username.trim()||!pass.trim()){setAdminMsg('⚠️ يرجى تعبئة جميع الحقول');return;}
    if(pass!==pass2){setAdminMsg('⚠️ كلمتا المرور غير متطابقتين');return;}
    if(pass.length<6){setAdminMsg('⚠️ كلمة المرور 6 أحرف على الأقل');return;}
    if(data.users.some(u=>u.id!=='admin'&&u.username===username.trim())){setAdminMsg('⚠️ اسم المستخدم مستخدم مسبقاً');return;}
    const adminUser={id:'admin',name:name.trim(),username:username.trim(),password:hashP(pass),role:R.ADMIN,jobTitle:'مدير النظام',createdAt:nowTs().date};
    const exists=data.users.find(u=>u.id==='admin');
    update('users',exists?data.users.map(u=>u.id==='admin'?adminUser:u):[...data.users,adminUser]);
    setAdminMsg('✅ تم حفظ بيانات المدير — استخدم البيانات الجديدة في المرة القادمة');
    setAdminForm({name:'',username:'',pass:'',pass2:''});
    setShowAdminForm(false);
  };

  const doRemoteWipe=async(userId)=>{
    if(wipeConfirm!=='امسح'){alert('اكتب كلمة امسح للتأكيد');return;}
    if(!supa)return;
    try{
      await supa.from('gmd_users').update({locked:true,locked_at:new Date().toISOString()}).eq('id',userId);
      update('users',data.users.map(u=>u.id===userId?{...u,locked:true}:u));
      window.auditLogDB('admin','المدير',R.ADMIN,'remote_wipe','طلب مسح: '+userId);
      alert('تم قفل الحساب. سيُمنع دخول الجهاز فور فتح التطبيق.');
      setWipeConfirm('');setWipeTarget('');
    }catch(e){alert('خطأ: '+e.message);}
  };

  const settings=[
    {key:'qrEnabled',        icon:'QR', title:'مسح QR Code للموزع',      desc:'فتح طلبية العميل بمسح QR. يتطلب ملصقات عند العملاء.',note:'غير مفعّل — يستخدم القائمة'},
    {key:'signatureEnabled', icon:'SG', title:'توقيع رقمي عند التسليم', desc:'يطلب توقيع العميل بعد التسليم.'},
    {key:'autoApproveAfter16',icon:'AP',title:'موافقة تلقائية بعد 4م',  desc:'طلب إذن بعد 4م يُوافَق تلقائياً بدون انتظار.'},
    {key:'proximityBlock',   icon:'PS', title:'فحص قرب الموزع 500م',    desc:'إذا الموزع ضمن 500م تظهر رسالة انتظار.'},
  ];

  return(
    <>
      <div style={{...G.card,background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.2)',marginBottom:14}}>
        <div style={{color:'#d97706',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:4}}>⚙️ إعدادات النظام</div>
        <div style={{color:'#64748b',fontSize:12,textAlign:'right'}}>التغييرات تسري فوراً على جميع المستخدمين</div>
      </div>

      {/* بيانات حساب المدير */}
      <div style={{...G.card,marginBottom:14,border:'1px solid rgba(37,99,235,.3)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <button onClick={()=>{setShowAdminForm(!showAdminForm);setAdminMsg('');}} style={G.bsm(showAdminForm?'rgba(100,116,139,.15)':'rgba(37,99,235,.1)',showAdminForm?'#94a3b8':'#2563eb')}>
            {showAdminForm?'إلغاء':'تغيير'}
          </button>
          <div style={{color:'#2563eb',fontSize:13,fontWeight:700,textAlign:'right'}}>👤 بيانات حساب المدير</div>
        </div>
        {!showAdminForm&&(
          <div style={{textAlign:'right'}}>
            <div style={{color:'#64748b',fontSize:12}}>الحساب الحالي: <span style={{color:'#1e293b',fontFamily:'monospace'}}>{data.users.find(u=>u.id==='admin')?.username||'admin'}</span></div>
            <div style={{color:'#94a3b8',fontSize:11,marginTop:3}}>اضغط "تغيير" لتحديث الاسم أو اسم المستخدم أو كلمة المرور</div>
          </div>
        )}
        {showAdminForm&&(
          <div>
            <label style={G.lbl}>الاسم الكامل</label>
            <input style={{...G.inp,marginBottom:8}} placeholder="مثال: فراس عمران" value={adminForm.name} onChange={e=>setAdminForm({...adminForm,name:e.target.value})}/>
            <label style={G.lbl}>اسم المستخدم (للدخول)</label>
            <input style={{...G.inp,marginBottom:8,direction:'ltr',textAlign:'left'}} placeholder="username" value={adminForm.username} onChange={e=>setAdminForm({...adminForm,username:e.target.value.trim()})}/>
            <label style={G.lbl}>كلمة المرور الجديدة</label>
            <input style={{...G.inp,marginBottom:8}} type="password" placeholder="6 أحرف على الأقل" value={adminForm.pass} onChange={e=>setAdminForm({...adminForm,pass:e.target.value})}/>
            <label style={G.lbl}>تأكيد كلمة المرور</label>
            <input style={{...G.inp,marginBottom:10}} type="password" placeholder="أعد كتابة كلمة المرور" value={adminForm.pass2} onChange={e=>setAdminForm({...adminForm,pass2:e.target.value})}/>
            {adminMsg&&<div style={{color:adminMsg.startsWith('✅')?'#16a34a':'#dc2626',fontSize:12,textAlign:'right',marginBottom:8}}>{adminMsg}</div>}
            <button onClick={saveAdminProfile} style={G.btn('#1d4ed8')}>💾 حفظ البيانات الجديدة</button>
          </div>
        )}
        {adminMsg&&!showAdminForm&&<div style={{color:'#16a34a',fontSize:12,textAlign:'right',marginTop:6}}>{adminMsg}</div>}
      </div>

      {/* Claude API Key */}
      <div style={{...G.card,marginBottom:14,border:'1px solid rgba(168,85,247,.3)'}}>
        <div style={{color:'#7c3aed',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>🤖 مفتاح Claude API</div>
        <div style={{color:'#64748b',fontSize:12,textAlign:'right',marginBottom:10,lineHeight:1.6}}>
          مطلوب للتحقق الجغرافي وتحليل صور الزيارات. احصل عليه من <span style={{color:'#7c3aed'}}>console.anthropic.com</span>
        </div>
        <input
          style={{...G.inp,fontFamily:'monospace',fontSize:12,direction:'ltr',textAlign:'left'}}
          type="password"
          placeholder="sk-ant-..."
          defaultValue={s.claudeApiKey||''}
          onBlur={e=>{
            const val=e.target.value.trim();
            update('settings',{...s,claudeApiKey:val});
          }}
        />
        <div style={{marginTop:6,textAlign:'right'}}>
          {s.claudeApiKey
            ?<span style={{color:'#16a34a',fontSize:12}}>✅ مفتاح محفوظ</span>
            :<span style={{color:'#dc2626',fontSize:12}}>⚠️ لم يُدخَل بعد — التحقق الجغرافي وتحليل الصور معطّلان</span>
          }
        </div>
      </div>
      {settings.map(({key,icon,title,desc,note})=>(
        <div key={key} style={{...G.card,marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
            <div onClick={()=>toggle(key)} style={{flexShrink:0,cursor:'pointer'}}>
              <div style={{width:48,height:26,borderRadius:13,background:s[key]?'#2563eb':'#1e293b',position:'relative',transition:'background .2s'}}>
                <div style={{position:'absolute',top:3,width:20,height:20,borderRadius:'50%',background:'white',transition:'left .2s',left:s[key]?26:3}}/>
              </div>
            </div>
            <div style={{textAlign:'right',flex:1}}>
              <div style={{color:'#1e293b',fontWeight:700,fontSize:14}}>{title}</div>
              <div style={{color:'#64748b',fontSize:12,marginTop:3,lineHeight:1.5}}>{desc}</div>
              {!s[key]&&note&&<div style={{color:'#d97706',fontSize:11,marginTop:3}}>⚠️ {note}</div>}
              {s[key]&&<div style={{color:'#16a34a',fontSize:11,marginTop:3}}>✅ مفعّل</div>}
            </div>
          </div>
        </div>
      ))}
      <div style={{...G.card,border:'1px solid rgba(239,68,68,.3)',marginTop:6}}>
        <div style={{color:'#dc2626',fontSize:14,fontWeight:700,textAlign:'right',marginBottom:10}}>🔒 مسح بيانات هاتف عن بعد</div>
        <div style={{color:'#64748b',fontSize:12,textAlign:'right',marginBottom:10,lineHeight:1.6}}>في حال ضياع هاتف موظف: اختره واكتب كلمة "امسح" لمسح بياناته فور فتح التطبيق.</div>
        <div style={{marginBottom:8}}>
          <label style={G.lbl}>اختر المستخدم</label>
          <select style={G.inp} value={wipeTarget} onChange={e=>setWipeTarget(e.target.value)}>
            <option value="">— اختر —</option>
            {data.users.map(u=><option key={u.id} value={u.id}>{u.name} ({RAR[u.role]})</option>)}
          </select>
        </div>
        <div style={{marginBottom:10}}>
          <label style={G.lbl}>اكتب كلمة "امسح" للتأكيد</label>
          <input style={G.inp} placeholder="امسح" value={wipeConfirm} onChange={e=>setWipeConfirm(e.target.value)}/>
        </div>
        <button onClick={()=>doRemoteWipe(wipeTarget)} disabled={!wipeTarget||wipeConfirm!=='امسح'}
          style={{...G.btn('#b91c1c'),opacity:(!wipeTarget||wipeConfirm!=='امسح')?0.4:1}}>
          🗑️ مسح البيانات عن بعد
        </button>
      </div>
    </>
  );
}

// OBSERVER APP — مشاهدة فقط

function ObserverApp({user,data,onLogout,dismissAlert,isOnline}){
  const [tab,setTab]=useState('live');
  const today=nowTs();
  const tabs=[
    {id:'live',   label:'مباشر',    icon:'📡'},
    {id:'orders', label:'الطلبيات', icon:'📦'},
    {id:'visits', label:'الزيارات', icon:'📸'},
  ];
  return(
    <>
      <Header user={user} onLogout={onLogout} title="لوحة المراقبة" isOnline={isOnline!==false}/>

      <div style={{background:'rgba(124,58,237,.06)',borderBottom:'1px solid rgba(124,58,237,.2)',padding:'6px 14px',textAlign:'center'}}>
        <span style={{color:'#7c3aed',fontSize:12}}>👁️ وضع المراقبة — عرض فقط — لا يمكن تعديل أي بيانات</span>
      </div>

        {tab==='live'&&<ObserverLive data={data} today={today}/>}

function ObserverLive({data,today}){
  const [tick,setTick]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),30000);return()=>clearInterval(iv);},[]);
  const todayOrders=data.orders.filter(o=>o.uploadDateISO===today.iso);
  const coords=data.users.filter(u=>u.role===R.COORDINATOR);
  return(
    <>
      <div style={{color:'#64748b',fontSize:11,textAlign:'center',marginBottom:12}}>يتجدد كل 30 ثانية · {today.date}</div>
      <StatGrid stats={[
        {label:'طلبيات اليوم', value:todayOrders.length,                                           color:'#1d4ed8',icon:'📦'},
        {label:'تم التسليم',   value:todayOrders.filter(o=>o.status===ST.DELIVERED).length,         color:'#15803d',icon:'✅'},
        {label:'قيد التسليم', value:todayOrders.filter(o=>o.status===ST.IN_DELIVERY).length,        color:'#b45309',icon:'🔄'},
        {label:'لم تُسلَّم',  value:todayOrders.filter(o=>o.status===ST.FAILED).length,             color:'#b91c1c',icon:'❌'},
      ]}/>
      <div style={{color:'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>إنجاز المنسقين اليوم</div>
      {coords.map(coord=>{
        const sch=(data.schedule[coord.id]||[]).filter(e=>String(e.dayOfWeek)===String(today.dayIndex));
        const vis=data.visits.filter(v=>v.coordId===coord.id&&v.date===today.date);
        const pct=sch.length>0?Math.round(vis.length/sch.length*100):0;
        return(
          <div key={coord.id} style={G.card}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
              <div style={{color:pct>=100?'#16a34a':pct>=60?'#d97706':'#dc2626',fontSize:18,fontWeight:800}}>{sch.length>0?pct+'%':'—'}</div>
              <div style={{textAlign:'right'}}>
                <div style={{color:'#1e293b',fontWeight:600}}>{coord.name}</div>
                <div style={{color:'#64748b',fontSize:12}}>{vis.length}/{sch.length} زيارة اليوم</div>
              </div>
            </div>
            <div style={{background:'#f0f4f8',borderRadius:20,height:6,overflow:'hidden'}}>
              <div style={{width:Math.min(pct,100)+'%',height:'100%',background:pct>=100?'#22c55e':pct>=60?'#d97706':'#ef4444',borderRadius:20}}/>
            </div>
          </div>
        );
      })}
      {coords.length===0&&<Empty icon="📋" text="لا يوجد منسقون"/>}
      <div style={{color:'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginTop:12,marginBottom:8}}>آخر الطلبيات</div>
      {[...todayOrders].reverse().slice(0,8).map(o=>(
        <div key={o.id} style={{...G.card,borderRight:'3px solid '+(SC[o.status]?.dot||'#334155')}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <Badge status={o.status}/>
            <div style={{textAlign:'right'}}>
              <div style={{color:'#1e293b',fontWeight:600}}>{o.customerName}</div>
              <div style={{color:'#64748b',fontSize:12}}>{o.distributorName} · {o.region}</div>
            </div>
          </div>
        </div>
      ))}
      {todayOrders.length===0&&<Empty icon="📦" text="لا توجد طلبيات اليوم"/>}
    </>
  );
}


function exportOrdersExcel(orders){
  const ws=XLSX.utils.json_to_sheet(orders.map(o=>({
    'اسم العميل':o.customerName,'المنطقة':o.region,'رقم الطلبية':o.orderNum,
    'الموزع':o.distributorName,'الحالة':STAR[o.status]||o.status,
    'تاريخ الرفع':o.uploadDate,'ملاحظة':o.note||'',
  })));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'الطلبيات');
  XLSX.writeFile(wb,'Golden_Mark_Orders.xlsx');
}

// EXPIRY REPORT — تقرير انتهاء الصلاحية
// ══════════════════════════════════════════
function ExpiryReport({data,update}){
  const list=[...(data.expiry||[])].reverse();
  const actions=['سحب البضاعة','إعادة تنسيق الرفوف','إعادة تدوير لعميل آخر','تم الاجراء'];

  const setAction=(id,action)=>{
    update('expiry',(data.expiry||[]).map(e=>e.id===id?{...e,action}:e));
  };

  return(
    <>
      <div style={{color:'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:12}}>
        تقارير انتهاء الصلاحية ({list.length})
      </div>
      {list.length===0&&<Empty icon="⚠️" text="لا توجد تقارير انتهاء صلاحية"/>}
      {list.map(rep=>(
        <div key={rep.id} style={{...G.card,borderRight:rep.action==='تم الاجراء'?'3px solid #22c55e':'3px solid #f59e0b',marginBottom:12}}>
          <div style={{textAlign:'right',marginBottom:10}}>
            <div style={{color:'#1e293b',fontWeight:700,fontSize:15}}>{rep.customerName}</div>
            <div style={{color:'#64748b',fontSize:12}}>المنسق: {rep.coordName} · {rep.reportedAt}</div>
          </div>
          <div style={{marginBottom:10}}>
            {rep.items.map((item,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:'rgba(245,158,11,.06)',borderRadius:8,marginBottom:4}}>
                <span style={{color:'#d97706',fontSize:12}}>{item.expDate}</span>
                <div style={{textAlign:'right'}}>
                  <span style={{color:'#1e293b',fontSize:13}}>{item.name}</span>
                  <span style={{color:'#64748b',fontSize:11,marginRight:8}}>كمية: {item.qty}</span>
                </div>
              </div>
            ))}
          </div>
          <div>
            <label style={G.lbl}>الإجراء المتخذ</label>
            <select style={G.inp} value={rep.action||'pending'} onChange={e=>setAction(rep.id,e.target.value)}>
              <option value="pending">— اختر الإجراء —</option>
              {actions.map(a=><option key={a} value={a}>{a}</option>)}
            </select>
          </div>
        </div>
      ))}
    </>
  );
}

// AUDIT LOG — سجل النشاط
// ══════════════════════════════════════════
function AuditLog({data}){
  const [q,setQ]=useState('');
  const list=[...(data.audit||[])].reverse();
  const filtered=q?list.filter(l=>l.userName?.includes(q)||l.action?.includes(q)||l.detail?.includes(q)):list;
  const actionColors={visit_start:'#22c55e',visit_end:'#3b82f6',remote_wipe:'#ef4444',login:'#2563eb'};

  return(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <span style={{color:'#64748b',fontSize:12}}>{list.length} سجل</span>
        <span style={{color:'#64748b',fontSize:13,fontWeight:700}}>سجل النشاط</span>
      </div>
      <input style={{...G.inp,marginBottom:10}} placeholder="🔍 بحث..." value={q} onChange={e=>setQ(e.target.value)}/>
      {filtered.length===0&&<Empty icon="📋" text="لا توجد سجلات"/>}
      {filtered.slice(0,100).map(log=>(
        <div key={log.id} style={{...G.card,borderRight:'3px solid '+(actionColors[log.action]||'#334155'),padding:'10px 14px',marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div style={{color:'#cbd5e1',fontSize:11,textAlign:'left'}}>
              <div>{log.date}</div>
              <div>{log.ts}</div>
            </div>
            <div style={{textAlign:'right',flex:1}}>
              <div style={{color:'#1e293b',fontSize:13,fontWeight:600}}>{log.userName} ({RAR[log.role]||log.role})</div>
              <div style={{color:actionColors[log.action]||'#94a3b8',fontSize:12}}>{log.action}</div>
              {log.detail&&<div style={{color:'#475569',fontSize:11,marginTop:2}}>{log.detail}</div>}
            </div>
          </div>
        </div>
      ))}
      {filtered.length>100&&<div style={{color:'#64748b',fontSize:12,textAlign:'center',padding:10}}>عرض أحدث 100 سجل من {filtered.length}</div>}
    </>
  );
}

// HEAT MAP — خريطة الحرارة (Canvas-based)
// ══════════════════════════════════════════
function HeatMap({data}){
  const canvasRef=useRef(null);
  const [filter,setFilter]=useState('all'); // all|delivered|failed|pending
  const [region,setRegion]=useState('');
  const [tooltip,setTooltip]=useState(null);

  // Get all customers with GPS and their order counts
  const points=useMemo(()=>{
    return data.customers
      .filter(c=>c.lat&&c.lng)
      .map(c=>{
        const orders=data.orders.filter(o=>o.customerName===c.name);
        const delivered=orders.filter(o=>o.status===ST.DELIVERED).length;
        const failed=orders.filter(o=>o.status===ST.FAILED).length;
        const visits=data.visits.filter(v=>v.customerName===c.name).length;
        const relevantOrders=filter==='all'?orders:
          filter==='delivered'?orders.filter(o=>o.status===ST.DELIVERED):
          filter==='failed'?orders.filter(o=>o.status===ST.FAILED):
          orders.filter(o=>o.status===ST.IN_DELIVERY||o.status===ST.PENDING);
        return{...c,orders:orders.length,delivered,failed,visits,
          active:filter==='all'?orders.length:relevantOrders.length};
      })
      .filter(p=>!region||p.region?.includes(region));
  },[data,filter,region]);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas||points.length===0)return;
    const ctx=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);

    if(points.length===0)return;

    // Find bounds
    const lats=points.map(p=>p.lat);
    const lngs=points.map(p=>p.lng);
    const minLat=Math.min(...lats),maxLat=Math.max(...lats);
    const minLng=Math.min(...lngs),maxLng=Math.max(...lngs);
    const pad=40;

    const toX=lng=>pad+(lng-minLng)/(maxLng-minLng||1)*(W-2*pad);
    const toY=lat=>pad+(maxLat-lat)/(maxLat-minLat||1)*(H-2*pad);

    const maxActive=Math.max(...points.map(p=>p.active),1);

    // Draw heat circles
    points.forEach(p=>{
      const x=toX(p.lng),y=toY(p.lat);
      const intensity=p.active/maxActive;
      const r=Math.max(20,intensity*60);

      // Gradient circle
      const grad=ctx.createRadialGradient(x,y,0,x,y,r);
      const alpha=0.15+intensity*0.55;
      const color=filter==='failed'?`rgba(239,68,68,${alpha})`:
                  filter==='delivered'?`rgba(34,197,94,${alpha})`:
                  `rgba(59,130,246,${alpha})`;
      grad.addColorStop(0,color);
      grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle=grad;
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(x,y,5,0,Math.PI*2);
      ctx.fillStyle=filter==='failed'?'#ef4444':filter==='delivered'?'#22c55e':'#3b82f6';
      ctx.fill();

      // Label if high intensity
      if(intensity>0.4){
        ctx.fillStyle='white';
        ctx.font='bold 10px Arial';
        ctx.textAlign='center';
        ctx.fillText(p.name.slice(0,8),x,y-10);
      }
    });

  },[points]);

  // Get regions list
  const regions=[...new Set(data.customers.map(c=>c.region).filter(Boolean))];

  return(
    <>
      <div style={{color:'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:10}}>
        خريطة الحرارة — توزع النشاط الجغرافي
      </div>

      {/* Filters */}
      <div style={{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        {[['all','الكل','#3b82f6'],['delivered','تم التسليم','#22c55e'],['failed','لم تُسلَّم','#ef4444'],['pending','قيد التسليم','#d97706']].map(([k,l,clr])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:'5px 12px',borderRadius:20,border:'1.5px solid '+(filter===k?clr:'#1e293b'),fontSize:12,fontWeight:600,cursor:'pointer',background:filter===k?clr:'transparent',color:filter===k?'white':'#64748b'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{marginBottom:10}}>
        <select style={G.inp} value={region} onChange={e=>setRegion(e.target.value)}>
          <option value="">كل المناطق</option>
          {regions.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
      </div>

      {points.length===0?(
        <Empty icon="🗺️" text="لا يوجد عملاء بإحداثيات GPS — حدّدها في قسم العملاء"/>
      ):(
        <>
          <div style={{background:'#ffffff',borderRadius:14,overflow:'hidden',border:'1px solid #e2e8f0'}}>
            <canvas ref={canvasRef} width={460} height={340} style={{width:'100%',display:'block'}}/>
          </div>
          {/* Legend */}
          <div style={{display:'flex',gap:12,justifyContent:'center',marginTop:8,flexWrap:'wrap'}}>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:12,height:12,borderRadius:'50%',background:'#3b82f6'}}/><span style={{color:'#64748b',fontSize:11}}>نشاط منخفض</span></div>
            <div style={{display:'flex',alignItems:'center',gap:4}}><div style={{width:16,height:16,borderRadius:'50%',background:'#3b82f6',opacity:.8}}/><span style={{color:'#64748b',fontSize:11}}>نشاط مرتفع</span></div>
          </div>
          {/* Summary */}
          <div style={{...G.card,marginTop:10}}>
            <div style={{color:'#2563eb',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>ملخص المناطق</div>
            {regions.slice(0,8).map(reg=>{
              const regOrders=data.orders.filter(o=>data.customers.find(c=>c.name===o.customerName&&c.region===reg));
              const regDel=regOrders.filter(o=>o.status===ST.DELIVERED).length;
              const pct=regOrders.length>0?Math.round(regDel/regOrders.length*100):0;
              return(
                <div key={reg} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'5px 0',borderBottom:'1px solid #e2e8f0'}}>
                  <div style={{color:pct>=80?'#16a34a':pct>=50?'#d97706':'#dc2626',fontSize:12,fontWeight:700}}>{pct}%</div>
                  <div style={{textAlign:'right'}}>
                    <span style={{color:'#1e293b',fontSize:12}}>{reg}</span>
                    <span style={{color:'#64748b',fontSize:11,marginRight:8}}>{regOrders.length} طلبية</span>
                  </div>
                </div>
              );
            })}
          </div>
        </>
      )}
    </>
  );
}


// ══════════════════════════════════════════════════════
// WAREHOUSE APP — أمين المستودع
// ══════════════════════════════════════════════════════
function WarehouseApp({user,data,update,onLogout,dismissAlert,isOnline}){
  const [selected,setSelected]=useState({});
  const [msg,setMsg]=useState('');
  const [filter,setFilter]=useState('all');
  const today=nowTs();

  // All pending warehouse orders (today + previous days)
  const pending=data.orders.filter(o=>o.status===ST.WAREHOUSE)
    .sort((a,b)=>{
      // oldest first so previous days appear at top
      if(a.uploadDateISO&&b.uploadDateISO) return a.uploadDateISO.localeCompare(b.uploadDateISO);
      return 0;
    });

  // Group by date
  const byDate={};
  pending.forEach(o=>{
    const d=o.uploadDateISO||o.uploadDate||'غير محدد';
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(o);
  });

  const toggleAll=(orders,val)=>{
    const upd={...selected};
    orders.forEach(o=>{ upd[o.id]=val; });
    setSelected(upd);
  };

  const release=()=>{
    const ids=Object.entries(selected).filter(([,v])=>v).map(([k])=>k);
    if(ids.length===0){setMsg('❌ لم تختر أي طلبية');return;}
    const n=nowTs();
    const updated=data.orders.map(o=>{
      if(!ids.includes(o.id))return o;
      return{...o,
        status:ST.IN_DELIVERY,
        statusHistory:[...(o.statusHistory||[]),
          {status:ST.IN_DELIVERY,time:n.date+' '+n.time,by:user.name}],
        warehouseReleasedAt:n.date+' '+n.time,
        warehouseReleasedBy:user.name,
      };
    });
    update('orders',updated);
    window.auditLogDB(user.id,user.name,user.role,'warehouse_release',ids.length+' طلبية');
    setSelected({});
    setMsg('✅ تم تحميل '+ids.length+' طلبية للموزعين');
    setTimeout(()=>setMsg(''),4000);
  };

  const selCount=Object.values(selected).filter(Boolean).length;
  const distNames=[...new Set(pending.map(o=>o.distributorName).filter(Boolean))];
  const filtered=filter==='all'?pending:pending.filter(o=>o.distributorName===filter);

  return(
    <>
      <Header user={user} onLogout={onLogout} title="المستودع" isOnline={isOnline!==false}/>
      <AlertBanner alerts={data.alerts} userId={user.id} role={R.WAREHOUSE} onDismiss={dismissAlert}/>
      <div style={G.sec}>

        {/* Stats */}
        <StatGrid stats={[
          {label:'انتظار التحميل', value:pending.length,         color:'#6d28d9',icon:'⏳'},
          {label:'مختارة الآن',    value:selCount,                color:'#1d4ed8',icon:'✓'},
          {label:'موزعون',         value:distNames.length,        color:'#15803d',icon:'🚚'},
          {label:'أيام متراكمة',   value:Object.keys(byDate).length,color:'#b45309',icon:'📅'},
        ]}/>

        {/* Filter by distributor */}
        {distNames.length>1&&(
          <div style={{marginBottom:10}}>
            <select style={G.inp} value={filter} onChange={e=>setFilter(e.target.value)}>
              <option value="all">جميع الموزعين ({pending.length})</option>
              {distNames.map(d=><option key={d} value={d}>{d} ({pending.filter(o=>o.distributorName===d).length})</option>)}
            </select>
          </div>
        )}

        {/* Action bar */}
        <div style={{display:'flex',gap:8,marginBottom:14}}>
          <button onClick={()=>toggleAll(filtered,true)}
            style={{...G.bsm('#15803d'),flex:1,padding:'9px',fontSize:13}}>
            تحديد الكل ({filtered.length})
          </button>
          <button onClick={()=>toggleAll(filtered,false)}
            style={{...G.bsm('rgba(100,116,139,.15)','#94a3b8'),flex:1,padding:'9px',fontSize:13}}>
            إلغاء الكل
          </button>
        </div>

        <Msg text={msg} onClear={()=>setMsg('')}/>

        {pending.length===0&&(
          <Empty icon="📦" text="لا توجد طلبيات معلقة — جميعها محمّلة"/>
        )}

        {/* Orders grouped by date */}
        {Object.entries(byDate).map(([date,orders])=>{
          const dayOrders=filter==='all'?orders:orders.filter(o=>o.distributorName===filter);
          if(dayOrders.length===0)return null;
          const isToday=date===today.iso;
          const allSelDay=dayOrders.every(o=>selected[o.id]);
          return(
            <div key={date}>
              {/* Date header */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                background:isToday?'rgba(29,78,216,.12)':'rgba(124,58,237,.12)',
                borderRadius:10,padding:'8px 14px',marginBottom:8,
                border:'1px solid '+(isToday?'rgba(29,78,216,.3)':'rgba(124,58,237,.3)')}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <input type="checkbox" checked={allSelDay}
                    onChange={e=>toggleAll(dayOrders,e.target.checked)}
                    style={{width:16,height:16,cursor:'pointer'}}/>
                  <span style={{color:'#94a3b8',fontSize:12}}>تحديد يوم</span>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{color:isToday?'#2563eb':'#7c3aed',fontWeight:700,fontSize:14}}>
                    {isToday?'📅 اليوم':('📆 '+date)}
                  </div>
                  <div style={{color:'#64748b',fontSize:12}}>{dayOrders.length} طلبية</div>
                </div>
              </div>

              {/* Order cards */}
              {dayOrders.map(o=>(
                <div key={o.id} onClick={()=>setSelected({...selected,[o.id]:!selected[o.id]})}
                  style={{...G.card,cursor:'pointer',
                    borderRight:'3px solid '+(selected[o.id]?'#22c55e':'#334155'),
                    background:selected[o.id]?'rgba(34,197,94,.06)':'#ffffff',
                    marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      <div style={{width:22,height:22,borderRadius:6,
                        background:selected[o.id]?'#22c55e':'#1e293b',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        flexShrink:0,border:'2px solid '+(selected[o.id]?'#22c55e':'#334155')}}>
                        {selected[o.id]&&<span style={{color:'white',fontSize:14,fontWeight:700}}>✓</span>}
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{color:'#1e293b',fontWeight:700,fontSize:14}}>{o.customerName}</div>
                        <div style={{color:'#64748b',fontSize:12}}>
                          {o.distributorName&&<span style={{color:'#2563eb'}}>🚚 {o.distributorName} · </span>}
                          {o.region}
                          {o.orderNum&&<span> · #{o.orderNum}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          );
        })}

        {/* Floating release button */}
        {selCount>0&&(
          <div style={{position:'sticky',bottom:16,zIndex:50}}>
            <button onClick={release}
              style={{...G.btn('#15803d'),fontSize:15,padding:'14px',
                boxShadow:'0 4px 20px rgba(21,128,61,.5)'}}>
              🚛 تحميل {selCount} طلبية للموزعين
            </button>
          </div>
        )}
      </div>
    </>
  );
}

// ══════════════════════════════════════════════════════
// ADMIN WAREHOUSE VIEW — عرض المستودع للمدير
// ══════════════════════════════════════════════════════
function AdminWarehouseView({data}){
  const [tab,setTab]=useState('pending');
  const today=nowTs();

  const pending=data.orders.filter(o=>o.status===ST.WAREHOUSE);
  const released=data.orders.filter(o=>o.status!==ST.WAREHOUSE&&o.warehouseReleasedBy);
  const allOrders=data.orders;

  const chips=[
    {k:'pending', l:'معلقة في المستودع ('+pending.length+')'},
    {k:'released',l:'محمّلة للموزعين ('+released.length+')'},
    {k:'all',     l:'الكل ('+allOrders.length+')'},
  ];

  const list=tab==='pending'?pending:tab==='released'?released:allOrders;

  return(
    <>
      <div style={{marginBottom:12}}>
        <StatGrid stats={[
          {label:'معلقة في المستودع', value:pending.length,  color:'#6d28d9',icon:'⏳'},
          {label:'محمّلة اليوم',      value:data.orders.filter(o=>o.warehouseReleasedAt?.startsWith(today.date)).length, color:'#15803d',icon:'🚛'},
          {label:'قيد التسليم',       value:data.orders.filter(o=>o.status===ST.IN_DELIVERY).length,color:'#b45309',icon:'🚚'},
          {label:'تم التسليم',        value:data.orders.filter(o=>o.status===ST.DELIVERED).length,  color:'#15803d',icon:'✅'},
        ]}/>
      </div>

      <div style={{display:'flex',gap:6,marginBottom:12,overflowX:'auto'}}>
        {chips.map(ch=>(
          <button key={ch.k} onClick={()=>setTab(ch.k)}
            style={{...G.bsm(tab===ch.k?'#1d4ed8':'rgba(0,0,0,.03)',tab===ch.k?'white':'#94a3b8'),
              whiteSpace:'nowrap',padding:'7px 14px',fontSize:12}}>
            {ch.l}
          </button>
        ))}
      </div>

      {list.length===0&&<Empty icon="📦" text="لا توجد طلبيات"/>}
      {list.map(o=>(
        <div key={o.id} style={{...G.card,
          borderRight:'3px solid '+(o.status===ST.WAREHOUSE?'#7c3aed':SC[o.status]?.dot||'#334155'),
          marginBottom:6}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <Badge status={o.status}/>
            <div style={{textAlign:'right',flex:1,marginRight:8}}>
              <div style={{color:'#1e293b',fontWeight:700}}>{o.customerName}</div>
              <div style={{color:'#64748b',fontSize:12}}>{o.distributorName} · {o.region}</div>
              {o.status===ST.WAREHOUSE&&(
                <div style={{color:'#7c3aed',fontSize:11,marginTop:2}}>
                  ⏳ مرفوعة {o.uploadDate} — انتظار أمين المستودع
                </div>
              )}
              {o.warehouseReleasedAt&&(
                <div style={{color:'#16a34a',fontSize:11,marginTop:2}}>
                  🚛 حُمِّلت: {o.warehouseReleasedAt} بواسطة {o.warehouseReleasedBy}
                </div>
              )}
            </div>
          </div>
        </div>
      ))}
    </>
  );
}
