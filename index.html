<script>
(function(){
  var APP_VERSION='gm-v13';

  // ── مسح الكاش القديم تلقائياً عند التشغيل ──
  if('caches' in window){
    caches.keys().then(function(keys){
      keys.forEach(function(key){
        if(key !== APP_VERSION){
          caches.delete(key);
          console.log('Deleted old cache:', key);
        }
      });
    });
  }

  // ── إزالة Service Workers القديمة وتحديثها فوراً ──
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){
        // تحديث فوري
        reg.update();
        // إذا SW قديم (scope خاطئ) احذفه
        var scope = reg.scope || '';
        if(scope.indexOf('goldenmarkdelivery') === -1 && scope !== ''){
          reg.unregister().then(function(){
            console.log('Unregistered old SW:', scope);
            window.location.reload();
          });
        }
      });
    });
  }

  // ── Service Worker registration ──
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').then(function(reg){
      console.log('SW registered:', reg.scope);
      // تحقق من تحديث فوري
      reg.addEventListener('updatefound', function(){
        var newSW = reg.installing;
        newSW.addEventListener('statechange', function(){
          if(newSW.state === 'installed' && navigator.serviceWorker.controller){
            // إعادة تحميل لتفعيل النسخة الجديدة
            newSW.postMessage({type:'SKIP_WAITING'});
            window.location.reload();
          }
        });
      });
    }).catch(function(){
      // Fallback blob SW
      var sw="const CACHE='gm-v13';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(c=>c||fetch(e.request)));});";
      try{navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});}catch(e){}
    });

    // استقبال رسالة SKIP_WAITING من SW
    navigator.serviceWorker.addEventListener('message', function(e){
      if(e.data && e.data.type === 'RELOAD') window.location.reload();
    });
  }

  // Install banner — معالجة محسّنة
  var dp=window._deferredPrompt||null;

  function showInstallBanner(){
    var banner=document.getElementById('inst-banner');
    if(banner)banner.classList.add('show');
  }

  // إذا الحدث وصل مبكراً قبل تحميل هذا الكود
  if(window._deferredPrompt){
    showInstallBanner();
  }

  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();
    dp=e;
    window._deferredPrompt=e;
    showInstallBanner();
  });

  // إخفاء الشريط بعد التثبيت
  window.addEventListener('appinstalled',function(){
    var banner=document.getElementById('inst-banner');
    if(banner)banner.classList.remove('show');
    dp=null;window._deferredPrompt=null;
  });

  var ib=document.getElementById('inst-btn');
  var ix=document.getElementById('inst-x');
  if(ib)ib.addEventListener('click',function(){
    if(dp){
      dp.prompt();
      dp.userChoice.then(function(){dp=null;window._deferredPrompt=null;document.getElementById('inst-banner').classList.remove('show');});
    } else {
      // iOS أو متصفح لا يدعم التثبيت التلقائي — إظهار تعليمات
      alert('لتثبيت التطبيق:\n\nAndroid Chrome: اضغط ⋮ ثم "تثبيت التطبيق"\niPhone Safari: اضغط زر المشاركة ثم "إضافة إلى الشاشة الرئيسية"');
    }
  });
  if(ix)ix.addEventListener('click',function(){document.getElementById('inst-banner').classList.remove('show');});

  // إظهار الشريط للأجهزة التي لا تطلق beforeinstallprompt (مثل iOS) بعد 3 ثوانٍ
  setTimeout(function(){
    var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone && !dp){
      var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
      if(isIOS)showInstallBanner();
    }
  },3000);
})();
</script>

window.loadAllData=async function(){
  try{
    var results=await Promise.allSettled([
      supa.from('gmd_users').select('*'),
      supa.from('gmd_customers').select('*'),
      supa.from('gmd_schedule').select('*'),
      supa.from('gmd_orders').select('*').order('created_ts',{ascending:false}).limit(500),
      supa.from('gmd_visits').select('*').order('created_ts',{ascending:false}).limit(1000),
      supa.from('gmd_perms').select('*').order('created_ts',{ascending:false}).limit(200),
      supa.from('gmd_alerts').select('*').order('created_ts',{ascending:false}).limit(200),
      supa.from('gmd_expiry').select('*').order('created_ts',{ascending:false}).limit(200),
      supa.from('gmd_audit').select('*').order('created_ts',{ascending:false}).limit(500),
      supa.from('gmd_settings').select('*').eq('id',1).single(),
    ]);
    var rUsers=results[0],rCusts=results[1],rSched=results[2],rOrders=results[3];
    var rVisits=results[4],rPerms=results[5],rAlerts=results[6],rExpiry=results[7];
    var rAudit=results[8],rSettings=results[9];
    var schedule={};
    (rSched.value&&rSched.value.data||[]).forEach(function(r){
      if(!schedule[r.coord_id])schedule[r.coord_id]=[];
      schedule[r.coord_id].push(fromDb.scheduleEntry(r));
    });
    var settings=fromDb.settings(rSettings.value&&rSettings.value.data);
    window._settingsCache=settings;
    return{
      users:(rUsers.value&&rUsers.value.data||[]).map(fromDb.user),
      customers:(rCusts.value&&rCusts.value.data||[]).map(fromDb.customer),
      schedule:schedule,
      orders:(rOrders.value&&rOrders.value.data||[]).map(fromDb.order),
      visits:(rVisits.value&&rVisits.value.data||[]).map(fromDb.visit),
      perms:(rPerms.value&&rPerms.value.data||[]).map(fromDb.perm),
      alerts:(rAlerts.value&&rAlerts.value.data||[]).map(fromDb.alert),

    };

    console.error('loadAllData error:',e);

};

// ── حفظ إلى Supabase ──
window.saveToDb=async function(key,value,prevValue){
  if(!supa)return;
  try{
    if(key==='users'){
      if(!value.length)return;
      await supa.from('gmd_users').upsert(value.map(toDb.user),{onConflict:'id'});
      var newIds=new Set(value.map(function(u){return u.id;}));
      var delIds=(prevValue||[]).filter(function(u){return !newIds.has(u.id);}).map(function(u){return u.id;});
      if(delIds.length)await supa.from('gmd_users').delete().in('id',delIds);
    }
    else if(key==='customers'){
      await supa.from('gmd_customers').upsert(value.map(toDb.customer),{onConflict:'id'});
      var newIds2=new Set(value.map(function(c){return c.id;}));
      var delIds2=(prevValue||[]).filter(function(c){return !newIds2.has(c.id);}).map(function(c){return c.id;});
      if(delIds2.length)await supa.from('gmd_customers').delete().in('id',delIds2);
    }
    else if(key==='schedule'){
      var rows=[];
      Object.keys(value).forEach(function(cId){
        value[cId].forEach(function(e){rows.push(toDb.scheduleEntry(cId,e));});
      });
      await supa.from('gmd_schedule').delete().neq('id','_placeholder_');
      if(rows.length)await supa.from('gmd_schedule').insert(rows);
    }
    else if(key==='orders'){
      if(!value.length)return;
      await supa.from('gmd_orders').upsert(value.map(toDb.order),{onConflict:'id'});
      var newIds3=new Set(value.map(function(o){return o.id;}));
      var delIds3=(prevValue||[]).filter(function(o){return !newIds3.has(o.id);}).map(function(o){return o.id;});
      if(delIds3.length)await supa.from('gmd_orders').delete().in('id',delIds3);
    }
    else if(key==='visits'){
      if(!value.length)return;
      await supa.from('gmd_visits').upsert(value.map(toDb.visit),{onConflict:'id'});
    }
    else if(key==='perms'){
      if(!value.length)return;
      await supa.from('gmd_perms').upsert(value.map(toDb.perm),{onConflict:'id'});
    }
    else if(key==='alerts'){
      await supa.from('gmd_alerts').upsert(value.map(toDb.alert),{onConflict:'id'});
      var newIds4=new Set(value.map(function(a){return a.id;}));
      var delIds4=(prevValue||[]).filter(function(a){return !newIds4.has(a.id);}).map(function(a){return a.id;});
      if(delIds4.length)await supa.from('gmd_alerts').delete().in('id',delIds4);
    }
    else if(key==='expiry'){
      if(!value.length)return;
      await supa.from('gmd_expiry').upsert(value.map(toDb.expiry),{onConflict:'id'});
    }
    else if(key==='audit'){
      var existIds=new Set((prevValue||[]).map(function(a){return a.id;}));
      var newEntries=value.filter(function(a){return !existIds.has(a.id);});
      if(newEntries.length)await supa.from('gmd_audit').insert(newEntries.map(toDb.audit));
    }
    else if(key==='settings'){
      window._settingsCache=value;
      await supa.from('gmd_settings').upsert(toDb.settings(value),{onConflict:'id'});
    }
  }catch(e){
    console.error('saveToDb('+key+') error:',e);
  }
};

// ── رفع صورة إلى Storage ──
window.uploadPhoto=async function(base64,visitId,index){
  try{
    var resp=await fetch(base64);
    var blob=await resp.blob();
    var path='visits/'+visitId+'/'+index+'_'+Date.now()+'.jpg';
    var result=await supa.storage.from('gmd-photos').upload(path,blob,{contentType:'image/jpeg',upsert:true});
    if(result.error)throw result.error;
    var urlData=supa.storage.from('gmd-photos').getPublicUrl(path);
    return{url:urlData.data.publicUrl,path:path};
  }catch(e){
    console.warn('Photo upload failed:',e);
    return{url:base64,path:null};
  }
};

window.runCleanup=async function(){
  try{
    var cutoff30=new Date();cutoff30.setDate(cutoff30.getDate()-30);
    var cutoff60=new Date();cutoff60.setDate(cutoff60.getDate()-60);
    var iso30=cutoff30.toISOString();
    var iso60=cutoff60.toISOString();
    var oldVisits=await supa.from('gmd_visits').select('photo_paths').lt('created_ts',iso30);
    if(oldVisits.data&&oldVisits.data.length){
      var paths=[];
      oldVisits.data.forEach(function(v){(v.photo_paths||[]).forEach(function(p){if(p)paths.push(p);});});
      if(paths.length)await supa.storage.from('gmd-photos').remove(paths);
    }
    await Promise.allSettled([
      supa.from('gmd_visits').delete().lt('created_ts',iso30),
      supa.from('gmd_orders').delete().lt('created_ts',iso30),
      supa.from('gmd_perms').delete().lt('created_ts',iso30),

// GPS check gate
// ═══════════════════════════════════════════════════════════
// AUTO VERIFY GATE — تحقق تلقائي بدون أي إدخال يدوي
//
// التسلسل التلقائي:
//  1. رقم النظام (114...) — مطابقة فورية من قاعدة البيانات
//  2. اسم العميل — مطابقة فورية من قاعدة البيانات
//  3. AI + GPS — يأخذ الموقع تلقائياً ويسأل Claude
//
// للمنسق: بعد نجاح أي مرحلة → يقيس المسافة GPS 50م
// للموزع: requireGps=false → يدخل بعد نجاح التحقق مباشرة
// ═══════════════════════════════════════════════════════════
function GpsGate({customer, onOk, onBack, user, requireGps=true}){
  // step: 'running' | 'gps50' | 'fail' | 'denied'
  const [step,   setStep]   = useState('running');
  const [log,    setLog]    = useState([]); // log of auto checks
  const [failMsg,setFailMsg]= useState('');
  const [dist50, setDist50] = useState(null);
  const [retrying,setRetrying]=useState(false);

  const addLog=(icon,text,color='#94a3b8')=>setLog(p=>[...p,{icon,text,color,t:Date.now()}]);

  // ── Entry point: run all checks automatically ──
  useEffect(()=>{ runAll(); },[]);

  const runAll=async()=>{
    setStep('running');setLog([]);setFailMsg('');setDist50(null);

    // ── المرحلة 1: رقم النظام ──────────────────────────
    addLog('🔢','فحص رقم النظام...','#2563eb');
    await sleep(400);
    const sysNum=String(customer?.sysNum||'').trim();
    if(sysNum && sysNum.startsWith('114')){
      addLog('✅','رقم النظام مُتحقق منه: '+sysNum,'#16a34a');
      return afterVerify('رقم النظام');
    } else if(sysNum){
      addLog('⚠️','رقم النظام موجود لكن لا يبدأ بـ 114 — الانتقال للمرحلة التالية','#d97706');
    } else {
      addLog('➡️','لا يوجد رقم نظام مسجل — الانتقال للمرحلة التالية','#64748b');
    }

    // ── المرحلة 2: اسم العميل في قاعدة البيانات ──────────────────────────
    await sleep(300);
    addLog('👤','فحص العميل في قاعدة البيانات...','#2563eb');
    await sleep(500);
    const custName=String(customer?.name||'').trim();
    const custRegion=String(customer?.region||'').trim();
    if(custName && custRegion){
      addLog('✅','العميل مُسجَّل: '+custName+' — '+custRegion,'#16a34a');
      return afterVerify('قاعدة البيانات');
    } else if(custName) {
      addLog('➡️','العميل غير مكتمل البيانات (لا توجد منطقة) — الانتقال للتحقق الجغرافي','#64748b');
    } else {
      addLog('➡️','اسم العميل غير مسجل — الانتقال للمرحلة الأخيرة','#64748b');
    }

    // ── المرحلة 3: AI + GPS المنطقة ────────────────────
    await sleep(300);
    addLog('📡','جاري الحصول على موقعك الجغرافي...','#7c3aed');
    let pos;
    try{
      pos=await new Promise((res,rej)=>getGps(res,rej));
    }catch(_e){
      addLog('❌','تعذّر الحصول على موقع GPS','#dc2626');
      setFailMsg('تعذّر الحصول على موقعك. يرجى تفعيل خدمة الموقع والسماح للمتصفح.');
      return setStep('fail');
    }

    const {latitude:lat,longitude:lng}=pos.coords;
    addLog('📍',`موقعك: ${lat.toFixed(4)}, ${lng.toFixed(4)}`,'#94a3b8');

    addLog('🌐','جاري تحديد المنطقة...','#7c3aed');
    let locationStr='غير محدد';
    try{
      const geo=await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`,
        {headers:{'Accept-Language':'ar'}}
      );
      const gd=await geo.json();
      locationStr=[gd?.address?.city,gd?.address?.town,gd?.address?.suburb,gd?.address?.county,gd?.address?.state].filter(Boolean).join('، ')||gd?.display_name||'غير محدد';
      addLog('📍','منطقتك الحالية: '+locationStr,'#94a3b8');
    }catch(_e){
      addLog('⚠️','لم يتمكن من تحديد اسم المنطقة','#d97706');
    }

    addLog('🤖','الذكاء الاصطناعي يحلل موقعك...','#7c3aed');
    try{
      const aiR=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':window.getApiKey(),
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true',
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:120,
          messages:[{role:'user',content:
            ('أنت نظام تحقق جغرافي دقيق. أجب بنعم أو لا فقط في أول كلمة. '
              +'منطقة العميل: '+(customer?.region||'غير محدد')+'. '
              +'موقع الموظف: '+locationStr+'. '
              +'الإحداثيات: '+lat.toFixed(4)+','+lng.toFixed(4)+'. '
              +'هل الموظف في منطقة العميل أو مجاورة لها؟')
          }]
        })
      });
      const aiD=await aiR.json();
      const aiTxt=(aiD?.content?.[0]?.text||'').trim();
      const approved=aiTxt.toLowerCase().startsWith('نعم')||aiTxt.startsWith('yes');
      if(approved){
        addLog('✅','الذكاء الاصطناعي: موقعك مطابق لمنطقة العميل','#16a34a');
        return afterVerify('الذكاء الاصطناعي');
      } else {
        addLog('❌','الذكاء الاصطناعي: '+aiTxt.split('\n')[0],'#dc2626');
        setFailMsg(`موقعك لا يطابق منطقة العميل "${customer?.region}". الموقع الحالي: ${locationStr}`);
        return setStep('fail');
      }
    }catch(_e){
      addLog('⚠️','تعذّر الاتصال بخدمة الذكاء الاصطناعي','#d97706');
      setFailMsg('تعذّر الاتصال بخدمة التحقق. تأكد من الإنترنت وأعد المحاولة.');
      return setStep('fail');
    }
  };

  // ── بعد نجاح أي مرحلة ──
  const afterVerify=async(method)=>{
    if(!requireGps || (!customer?.lat && !customer?.lng)){
      // لا إحداثيات مخزنة أو الموزع لا يحتاج GPS 50م
      addLog('🎉','تم التحقق عبر: '+method+' — جاري الدخول...','#16a34a');
      await sleep(600);
      onOk();
      return;
    }
    // منسق مع إحداثيات → قياس 50 متر
    addLog('📏','قياس المسافة عن موقع العميل...','#2563eb');
    setStep('gps50');
    getGps(pos=>{
      const dm=Math.round(mDist(pos.coords.latitude,pos.coords.longitude,customer.lat,customer.lng));
      setDist50(dm);
      if(dm<=50){
        addLog('✅',`المسافة ${dm} متر — ضمن النطاق المسموح ✓`,'#16a34a');
        onOk();
      }
      // else stays on gps50 screen showing distance
    },()=>{
      setStep('fail');
      setFailMsg('تعذّر قياس المسافة. يرجى تفعيل خدمة الموقع.');
    });
  };

  const sleep=ms=>new Promise(r=>setTimeout(r,ms));

  const retry=()=>{setRetrying(true);runAll().finally(()=>setRetrying(false));};

  // ── شاشة التحقق الجارية ──
  const RunningScreen=()=>(
    <div style={{display:'flex',flexDirection:'column',padding:24,minHeight:'80vh',gap:0}}>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:48,marginBottom:8}} className="pulse">🔐</div>
        <div style={{color:'#1e293b',fontSize:17,fontWeight:700}}>جاري التحقق التلقائي</div>
        <div style={{color:'#64748b',fontSize:12,marginTop:4}}>يرجى الانتظار...</div>
      </div>
      <div style={{...G.card,flex:1}}>
        {log.map((l,i)=>(
          <div key={l.t+i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:10,animation:'fadeIn .3s ease'}} className="fade">
            <span style={{fontSize:16,flexShrink:0}}>{l.icon}</span>
            <span style={{color:l.color,fontSize:13,lineHeight:1.5}}>{l.text}</span>
          </div>
        ))}
        {log.length===0&&<div style={{color:'#64748b',fontSize:13,textAlign:'center',padding:20}}>...</div>}
      </div>
    </div>
  );

  // ── شاشة GPS 50م ──
  const Gps50Screen=()=>(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,minHeight:'80vh',gap:14,textAlign:'center'}}>
      {dist50==null ? (
        <><div style={{fontSize:52}} className="pulse">📡</div>
        <div style={{color:'#1e293b',fontSize:16,fontWeight:700}}>قياس المسافة من موقع العميل...</div></>
      ):(
        <>
          <div style={{fontSize:52}}>📏</div>
          <div style={{color:'#dc2626',fontSize:20,fontWeight:800}}>أنت بعيد عن موقع العميل</div>
          <div style={{...G.card,maxWidth:300,width:'100%'}}>
            <div style={{color:'#d97706',fontSize:36,fontWeight:800,textAlign:'center',marginBottom:4}}>{dist50}م</div>
            <div style={{color:'#94a3b8',fontSize:13,textAlign:'center'}}>يجب أن تكون ضمن 50 متر</div>
          </div>
          <button onClick={()=>{setDist50(null);afterVerify('إعادة قياس');}} style={{...G.btn(),maxWidth:240}}>🔄 إعادة القياس</button>
        </>
      )}
    </div>
  );

  // ── شاشة الفشل ──
  const FailScreen=()=>(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,minHeight:'80vh',gap:14,textAlign:'center'}}>
      <div style={{fontSize:52}}>🚫</div>
      <div style={{color:'#dc2626',fontSize:20,fontWeight:800}}>لم يتم التحقق</div>
      <div style={{...G.card,maxWidth:320,width:'100%',textAlign:'right'}}>
        <div style={{color:'#94a3b8',fontSize:13,lineHeight:1.7}}>{failMsg}</div>
      </div>
      <div style={{...G.card,maxWidth:320,width:'100%',textAlign:'right',background:'rgba(241,245,249,.8)'}}>
        <div style={{color:'#475569',fontSize:12,marginBottom:6}}>سجل التحقق:</div>
        {log.map((l,i)=>(
          <div key={i} style={{display:'flex',gap:6,marginBottom:6}}>
            <span style={{fontSize:13}}>{l.icon}</span>
            <span style={{color:l.color,fontSize:11,lineHeight:1.5}}>{l.text}</span>
          </div>
        ))}
      </div>
      <button onClick={retry} disabled={retrying} style={{...G.btn(),maxWidth:240,opacity:retrying?0.6:1}}>
        {retrying?'⏳ جاري التحقق...':'🔄 إعادة المحاولة'}
      </button>
    </div>
  );

  return(
    <div style={G.page}>
      {onBack&&<Header user={user} onBack={onBack} title={customer?.name||''}/>}
      {step==='running' && <RunningScreen/>}
      {step==='gps50'   && <Gps50Screen/>}
      {step==='fail'    && <FailScreen/>}
    </div>
  );
}

// CHECK MISSED VISITS — يعمل تلقائياً عند فتح التطبيق
// يتحقق من الزيارات الفائتة لنهاية اليوم ويرسل تنبيهاً
// ═══════════════════════════════════════════════════════
function checkMissedVisitsAlert(loaded){
  const today=nowTs();
  const schedule=loaded.schedule||{};
  const visits=loaded.visits||[];
  const users=loaded.users||[];
  const alerts=loaded.alerts||[];

  // Only check if it's late enough in the day (after 5 PM = 17:00)
  const hour=new Date().getHours();
  if(hour<17)return; // don't fire early in the day

  // Check if we already sent a missed-visit alert today
  const alreadySent=alerts.some(a=>a.autoType==='missed_visits'&&a.createdISO===today.iso);
  if(alreadySent)return;

  const missed=[];

  // For each coordinator, check today's schedule
  users.filter(u=>u.role===R.COORDINATOR).forEach(coord=>{
    const todaySch=(schedule[coord.id]||[]).filter(e=>String(e.dayOfWeek)===String(today.dayIndex));
    const todayVis=visits.filter(v=>v.coordId===coord.id&&v.date===today.date);
    const notVisited=todaySch.filter(e=>!todayVis.find(v=>v.scheduleId===e.id));
    if(notVisited.length>0){
      missed.push({coord:coord.name,count:notVisited.length,customers:notVisited.map(e=>e.customerName).join('، ')});
    }
  });

  if(missed.length===0)return;

  // Build alert message
  const lines=missed.map(m=>`• ${m.coord}: ${m.count} زيارة (${m.customers})`).join('\n');
  const msg=`⚠️ تنبيه زيارات فائتة - ${today.date}\n${lines}`;

  const newAlert={
    id:uid(),message:msg,target:'admin_only',
    createdAt:`${today.date} ${today.time}`,
    createdISO:today.iso,createdBy:'النظام',
    autoType:'missed_visits',readBy:[],
    isSystem:true,
  };

  const updAlerts=[...alerts,newAlert];
  // حفظ في Supabase
  if(window._supa){
    window._supa.from('gmd_alerts').insert([{
      id:newAlert.id,message:newAlert.message,target:'admin_only',
      created_at:newAlert.createdAt,created_iso:newAlert.createdISO,
      created_by:'النظام',read_by:[],is_system:true,auto_type:'missed_visits'
    }]).catch(()=>{});
  }
}

function App(){
  const [user,setUser]=useState(null);
  const [ready,setReady]=useState(false);
  const [data,setData]=useState({users:[],customers:[],schedule:{},orders:[],visits:[],perms:[],alerts:[],sigs:[],expiry:[],audit:[],settings:{qrEnabled:false,signatureEnabled:true,autoApproveAfter16:false,proximityBlock:true}});

  useEffect(()=>{
    // ── تحميل البيانات من Supabase ──
    (async()=>{
      if(!supa){
        setData({users:[],customers:[],schedule:{},orders:[],visits:[],perms:[],alerts:[],sigs:[],expiry:[],audit:[],settings:{qrEnabled:false,signatureEnabled:true,autoApproveAfter16:false,proximityBlock:true,claudeApiKey:''}});
        setReady(true);
        return;
      }
      const loaded=await window.loadAllData();
      if(!loaded){
        setData({users:[],customers:[],schedule:{},orders:[],visits:[],perms:[],alerts:[],sigs:[],expiry:[],audit:[],settings:{qrEnabled:false,signatureEnabled:true,autoApproveAfter16:false,proximityBlock:true,claudeApiKey:''}});
        setReady(true);
        return;
      }
      setData(loaded);

      // ── استعادة الجلسة ──
      const sess=LS.get(SK.SESSION);
      if(sess&&sess.remember){
        const exp=new Date(sess.expires);
        if(exp>new Date()){
          if(sess.userId==='admin'){
            setUser({id:'admin',username:'admin',name:'المدير',role:R.ADMIN,jobTitle:'مدير النظام'});
          } else {
            const fu=(loaded.users||[]).find(u=>u.id===sess.userId);
            if(fu){
              // فحص القفل
              if(fu.locked){ localStorage.clear(); LS.set(SK.SESSION,null); }
              else setUser(fu);
            }
          }
        } else { LS.set(SK.SESSION,null); }
      }

      // ── تنظيف تلقائي (مرة يومياً) ──
      const lastClean=localStorage.getItem('gm_last_clean');
      const today=new Date().toISOString().split('T')[0];
      if(lastClean!==today){ window.runCleanup(); localStorage.setItem('gm_last_clean',today); }

      setReady(true);
      checkMissedVisitsAlert(loaded);
    })();
  },[]);

  // ── Realtime subscriptions ──
  useEffect(()=>{
    if(!user||!supa)return;
    const channels=[];
    // طلبيات
    channels.push(supa.channel('rt_orders').on('postgres_changes',{event:'*',schema:'public',table:'gmd_orders'},()=>{
      supa.from('gmd_orders').select('*').order('created_ts',{ascending:false}).limit(500)
        .then(({data:rows})=>{ if(rows) setData(p=>({...p,orders:rows.map(window._fromDb.order)})); });
    }).subscribe());
    // إذن
    channels.push(supa.channel('rt_perms').on('postgres_changes',{event:'*',schema:'public',table:'gmd_perms'},()=>{
      supa.from('gmd_perms').select('*').order('created_ts',{ascending:false}).limit(200)
        .then(({data:rows})=>{ if(rows) setData(p=>({...p,perms:rows.map(window._fromDb.perm)})); });
    }).subscribe());
    // تنبيهات
    channels.push(supa.channel('rt_alerts').on('postgres_changes',{event:'*',schema:'public',table:'gmd_alerts'},()=>{
      supa.from('gmd_alerts').select('*').order('created_ts',{ascending:false}).limit(200)
        .then(({data:rows})=>{ if(rows) setData(p=>({...p,alerts:rows.map(window._fromDb.alert)})); });
    }).subscribe());
    // زيارات
    channels.push(supa.channel('rt_visits').on('postgres_changes',{event:'INSERT',schema:'public',table:'gmd_visits'},()=>{
      supa.from('gmd_visits').select('*').order('created_ts',{ascending:false}).limit(1000)
        .then(({data:rows})=>{ if(rows) setData(p=>({...p,visits:rows.map(window._fromDb.visit)})); });
    }).subscribe());
    return()=>{ channels.forEach(ch=>supa.removeChannel(ch)); };
  },[user]);

  const update=useCallback((key,value)=>{
    setData(prev=>{
      window.saveToDb(key,value,prev[key]); // async, non-blocking
      return{...prev,[key]:value};
    });
  },[]);

  // ── Offline status indicator ──
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  useEffect(()=>{
    const on=()=>setIsOnline(true);
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  const login=useCallback((u,p,remember)=>{
    u=String(u||'').trim();p=String(p||'').trim();
    const doLogin=async()=>{
      let fu=null;
      if(u==='admin'&&p==='admin123'){
        fu={id:'admin',username:'admin',name:'المدير',role:R.ADMIN,jobTitle:'مدير النظام'};
      } else {
        fu=data.users.find(x=>x.username===u&&(x.password===hashP(p)||x.password===p));
        if(!fu&&supa){
          try{
            const{data:row}=await supa.from('gmd_users').select('*').eq('username',u).single();
            if(row){const mapped=window._fromDb.user(row);if(mapped.password===hashP(p)||mapped.password===p)fu=mapped;}
          }catch(e){}
        }
      }
      if(fu){
        if(fu.locked){alert('تم تعطيل حسابك. تواصل مع المدير.');return false;}
        setUser(fu);
        if(remember){const exp=new Date();exp.setDate(exp.getDate()+30);LS.set(SK.SESSION,{userId:fu.id,remember:true,expires:exp.toISOString()});}
        return true;
      }
      return false;
    };
    return doLogin();
  },[data]);

  const logout=useCallback(()=>{ LS.set(SK.SESSION,null); setUser(null); },[]);

  const dismissAlert=useCallback((alertId)=>{
    const upd=data.alerts.map(a=>a.id===alertId?{...a,readBy:[...(a.readBy||[]),user.id]}:a);
    update('alerts',upd);
  },[user,update,data.alerts]);

  if(!ready)return(
    <div style={{...G.page,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10,minHeight:'100vh'}}>
      <div style={{fontSize:54}}>🚚</div>
      <div style={{color:'#2563eb',fontSize:20,fontWeight:800}}>Golden Mark</div>
      <div style={{color:'#94a3b8',fontSize:13}}>جاري التحميل...</div>
    </div>
  );

  if(!user)return <LoginPage onLogin={login} hasRealAdmin={data.users.some(u=>u.id==='admin'&&u.username!=='admin')||data.users.some(u=>u.role===R.ADMIN&&u.id!=='admin')}/>;
  const p={user,data,update,onLogout:logout,dismissAlert,isOnline};
  return(
    <div style={G.page}>
      {user.role===R.ADMIN       &&<AdminApp       {...p}/>}
      {user.role===R.ACCOUNTING  &&<AccountingApp  {...p}/>}
      {user.role===R.DISTRIBUTOR &&<DistributorApp {...p}/>}
      {user.role===R.COORDINATOR &&<CoordApp       {...p}/>}
      {user.role===R.OBSERVER    &&<ObserverApp    {...p}/>}
      {user.role===R.WAREHOUSE   &&<WarehouseApp   {...p}/>}
    </div>
  );
}

  return(
    <div style={{...G.page,display:'flex',alignItems:'center',justifyContent:'center',padding:20,minHeight:'100vh',background:'linear-gradient(135deg,#e8f0fe,#f0f4f8)'}}>

            <label style={G.lbl}>اسم المستخدم</label>

          </div>
          <div style={{marginBottom:16}}>
            <label style={G.lbl}>كلمة المرور</label>
            <div style={{position:'relative'}}>

            </div>
          </div>
          {/* Remember Me */}
          <div onClick={()=>setRem(!rem)} style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:10,padding:'8px 12px',background:rem?'rgba(37,99,235,.06)':'#f8fafc',borderRadius:10,marginBottom:12,cursor:'pointer',border:'1px solid '+(rem?'rgba(37,99,235,.3)':'#1e293b')}}>
            <span style={{color:rem?'#1e293b':'#64748b',fontSize:13}}>تذكرني لمدة 30 يوماً</span>
            <div style={{width:40,height:22,borderRadius:11,background:rem?'#2563eb':'#1e293b',position:'relative',transition:'background .2s',flexShrink:0}}>
              <div style={{position:'absolute',top:3,width:16,height:16,borderRadius:'50%',background:'white',transition:'left .2s',left:rem?20:3}}/>
            </div>
          </div>
          {err&&<div style={{background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.2)',color:'#dc2626',padding:'8px 12px',borderRadius:8,fontSize:13,textAlign:'center',marginBottom:12}}>⚠️ {err}</div>}
          <button onClick={go} style={G.btn()}>تسجيل الدخول →</button>
          {!hasRealAdmin&&(
          <div style={{marginTop:11,padding:'8px 12px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:8,textAlign:'center'}}>
            <div style={{color:'#94a3b8',fontSize:11,marginBottom:2}}>المدير الافتراضي</div>
            <div style={{color:'#2563eb',fontSize:12,fontFamily:'monospace'}}>admin / admin123</div>
          </div>
          )}
        </div>
      </div>
    </div>
  );
}

        {tab==='perms'    &&<PermsMgmt      data={data} update={update}/>}
        {tab==='alerts'   &&<AlertsMgmt     data={data} update={update} user={user}/>}
        {tab==='reports'  &&<Reports        data={data} update={update} user={user}/>}
        {tab==='settings' &&<SystemSettings  data={data} update={update} user={user}/>}
        {tab==='expiry'   &&<ExpiryReport   data={data} update={update}/>}
        {tab==='audit'    &&<AuditLog       data={data}/>}
        {tab==='heatmap'  &&<HeatMap        data={data}/>}
      </div>
    </>
  );
}

function UserMgmt({data,update}){
  const APP_URL='firasgoldenmark-feras.github.io/goldenmarkdelivery';
  const ROLE_DESC={
    [R.DISTRIBUTOR]:'موزع - يحدّث حالة الطلبيات',
    [R.COORDINATOR]:'منسق - يزور العملاء ويصور',
    [R.ACCOUNTING]:'محاسبة - يرفع الطلبيات اليومية',
    [R.OBSERVER]:'مراقب - مشاهدة فقط',
    [R.WAREHOUSE]:'أمين مستودع - يحمّل الطلبيات',
  };
  const genPass=()=>{
    const chars='abcdefghjkmnpqrstuvwxyz23456789';
    return Array.from({length:8},()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  };
  const JOB_DEFAULTS={[R.DISTRIBUTOR]:'موزع',[R.COORDINATOR]:'منسق',[R.ACCOUNTING]:'محاسبة',[R.OBSERVER]:'مراقب',[R.WAREHOUSE]:'أمين مستودع'};
  const [form,setForm]=useState({name:'',phone:'',role:R.DISTRIBUTOR,jobTitle:''});
  const [autoPass,setAutoPass]=useState(genPass());
  const [open,setOpen]=useState(false);
  const [msg,setMsg]=useState('');
  const [newUser,setNewUser]=useState(null);
  const [resetId,setResetId]=useState(null);

  const openForm=()=>{setAutoPass(genPass());setForm({name:'',phone:'',role:R.DISTRIBUTOR,jobTitle:''});setNewUser(null);setOpen(true);};

  const add=()=>{
    const name=form.name.trim();
    const phone=form.phone.trim();
    if(!name||!phone){setMsg('❌ أدخل الاسم الكامل ورقم الهاتف');return;}
    if(phone.length<10||!phone.startsWith('9627')){setMsg('❌ رقم الهاتف يجب أن يبدأ بـ 9627');return;}
    const username=name;
    if(data.users.find(u=>u.username===username)){setMsg('❌ اسم المستخدم "'+username+'" مستخدم مسبقاً - يرجى تعديل الاسم');return;}
    const jobTitle=form.jobTitle.trim()||JOB_DEFAULTS[form.role];
    const saved={id:uid(),name,username,password:hashP(autoPass),role:form.role,jobTitle,phone,createdAt:nowTs().date};
    update('users',[...data.users,saved]);
    setNewUser({...saved,plainPass:autoPass});
    setOpen(false);
    setMsg('✅ تم إضافة المستخدم - أرسل له بيانات الدخول عبر واتساب');
  };

  const waNewUser=(u)=>{

      +'الرابط:\n'+APP_URL+'\n\n'
      +'اسم المستخدم: '+u.username+'\n'
      +'كلمة المرور: '+u.plainPass+'\n'
      +'الصلاحية: '+role+'\n\n'

  };

  const waReset=(u,pass)=>{

// Permanent customers file management
function CustomersMgmt({data,update}){
  const [editId,setEditId]=useState(null);
  const [ec,setEc]=useState({lat:'',lng:''});
  const [q,setQ]=useState('');
  const [addOpen,setAddOpen]=useState(false);
  const [form,setForm]=useState({name:'',region:'',sysNum:'',lat:'',lng:''});
  const [msg,setMsg]=useState('');
  const [loading,setLoading]=useState(false);
  const fileRef=useRef();

  const list=data.customers.filter(c=>!q||c.name?.includes(q)||c.region?.includes(q)||c.sysNum?.includes(q));

  const addCustomer=()=>{
    if(!form.name.trim()){setMsg('❌ أدخل اسم العميل');return;}
    if(data.customers.find(c=>c.name===form.name.trim())){setMsg('❌ العميل موجود مسبقاً');return;}
    const lat=parseFloat(form.lat),lng=parseFloat(form.lng);
    update('customers',[...data.customers,{id:uid(),name:form.name.trim(),region:form.region.trim(),sysNum:form.sysNum.trim(),lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng}]);
    setForm({name:'',region:'',sysNum:'',lat:'',lng:''});setMsg('✅ تم إضافة العميل');setAddOpen(false);setTimeout(()=>setMsg(''),3000);
  };

  const saveGps=id=>{
    const lat=parseFloat(ec.lat),lng=parseFloat(ec.lng);
    if(isNaN(lat)||isNaN(lng)){alert('أدخل إحداثيات صحيحة');return;}
    update('customers',data.customers.map(c=>c.id===id?{...c,lat,lng}:c));setEditId(null);
  };

  const myLoc=()=>getGps(p=>setEc({lat:p.coords.latitude.toFixed(6),lng:p.coords.longitude.toFixed(6)}),()=>alert('تعذّر الحصول على الموقع'));

  const uploadExcel=async e=>{
    const f=e.target.files[0];if(!f)return;setLoading(true);setMsg('');
    try{
      const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const existing=new Set(data.customers.map(c=>c.name));
      const news=[];
      rows.forEach(r=>{
        const name=String(r['اسم العميل']||r['العميل']||'').trim();
        if(!name||existing.has(name))return;
        const lat=parseFloat(r['lat']||r['خط العرض']||'');
        const lng=parseFloat(r['lng']||r['خط الطول']||'');
        news.push({id:uid(),name,region:String(r['المنطقة']||r['منطقة']||'').trim(),sysNum:String(r['رقم النظام']||r['sysNum']||'').trim(),lat:isNaN(lat)?null:lat,lng:isNaN(lng)?null:lng});
        existing.add(name);
      });
      update('customers',[...data.customers,...news]);
      setMsg(`✅ تم استيراد ${news.length} عميل جديد`);
    }catch(err){setMsg('❌ خطأ: '+err.message);}
    setLoading(false);e.target.value='';
  };

  return(
    <>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>setAddOpen(!addOpen)} style={G.bsm()}>+ إضافة</button>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={uploadExcel} style={{display:'none'}}/>
          <button onClick={()=>fileRef.current?.click()} disabled={loading} style={G.bsm('#7c3aed')}>📂 Excel</button>
        </div>
        <span style={{color:'#64748b',fontSize:13,fontWeight:700}}>العملاء ({data.customers.length})</span>
      </div>
      <Msg text={msg} onClear={()=>setMsg('')}/>

      {addOpen&&(
        <div style={{...G.card,marginBottom:12}} className="fade">
          <div style={{color:'#2563eb',fontSize:13,fontWeight:700,marginBottom:10,textAlign:'right'}}>إضافة عميل جديد</div>
          {[['name','اسم العميل *'],['region','المنطقة'],['sysNum','رقم النظام'],['lat','خط العرض (lat)'],['lng','خط الطول (lng)']].map(([k,l])=>(
            <div key={k} style={{marginBottom:8}}>
              <label style={G.lbl}>{l}</label>
              <input style={G.inp} placeholder={l} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}/>
            </div>
          ))}
          <button onClick={addCustomer} style={G.btn('#15803d')}>+ إضافة</button>
        </div>
      )}

      <div style={{background:'#f1f5f9',borderRadius:8,padding:'8px 12px',marginBottom:10,border:'1px solid #e2e8f0'}}>
        <div style={{color:'#64748b',fontSize:11,marginBottom:4,textAlign:'right'}}>أعمدة Excel للاستيراد:</div>
        {['اسم العميل','المنطقة','رقم النظام','lat (خط العرض)','lng (خط الطول)'].map(c=><div key={c} style={{color:'#2563eb',fontSize:11,textAlign:'right'}}>• {c}</div>)}
      </div>

      <input style={{...G.inp,marginBottom:10}} placeholder="🔍 بحث بالاسم أو المنطقة أو رقم النظام..." value={q} onChange={e=>setQ(e.target.value)}/>

      {list.map(c=>(
        <div key={c.id} style={{...G.card,borderRight:`3px solid ${c.lat&&c.lng?'#22c55e':'#d97706'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              {editId===c.id
                ?<button onClick={()=>saveGps(c.id)} style={G.bsm('#15803d')}>✓ حفظ</button>
                :<button onClick={()=>{setEditId(c.id);setEc({lat:c.lat||'',lng:c.lng||''});}} style={G.bsm()}>تعديل GPS</button>
              }
              <button onClick={()=>{if(confirm('حذف هذا العميل؟'))update('customers',data.customers.filter(x=>x.id!==c.id));}} style={G.bsm('rgba(239,68,68,.1)','#dc2626')}>حذف</button>
            </div>
            <div style={{textAlign:'right',flex:1}}>
              <div style={{color:'#1e293b',fontWeight:700}}>{c.name}</div>
              <div style={{color:'#64748b',fontSize:12}}>{c.region}{c.sysNum&&` · #${c.sysNum}`}</div>
              {editId===c.id?(
                <div style={{marginTop:8}}>
                  <div style={{display:'flex',gap:6,marginBottom:6}}>
                    <input style={{...G.inp,flex:1,fontSize:12,padding:'7px 10px'}} placeholder="lat" value={ec.lat} onChange={e=>setEc({...ec,lat:e.target.value})}/>
                    <input style={{...G.inp,flex:1,fontSize:12,padding:'7px 10px'}} placeholder="lng" value={ec.lng} onChange={e=>setEc({...ec,lng:e.target.value})}/>
                  </div>
                  <button onClick={myLoc} style={{background:'none',border:'1px solid #e2e8f0',color:'#2563eb',borderRadius:8,padding:'5px 10px',fontSize:12,cursor:'pointer'}}>📍 موقعي الحالي</button>
                </div>
              ):(
                <div style={{fontSize:11,marginTop:3,color:c.lat&&c.lng?'#16a34a':'#d97706'}}>{c.lat&&c.lng?`📍 ${c.lat}, ${c.lng}`:'⚠️ لم يُحدَّد الموقع'}</div>
              )}
            </div>
          </div>
        </div>
      ))}
      {list.length===0&&<Empty icon="📍" text="لا يوجد عملاء — أضف أو استورد من Excel"/>}
    </>
  );
}

// Permanent coordinator schedule management
function ScheduleMgmt({data,update}){
  const [msg,setMsg]=useState('');const [loading,setLoading]=useState(false);
  const [selCoord,setSelCoord]=useState('');
  const [form,setForm]=useState({customerName:'',dayOfWeek:'0',visitTime:''});
  const fileRef=useRef();
  const coords=data.users.filter(u=>u.role===R.COORDINATOR);

  const uploadExcel=async e=>{
    const f=e.target.files[0];if(!f)return;setLoading(true);setMsg('');
    try{
      const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const ns={...data.schedule};let cnt=0;
      rows.forEach(r=>{
        const cn=String(r['اسم المنسق']||r['المنسق']||'').trim();
        const coord=data.users.find(u=>u.role===R.COORDINATOR&&(u.name===cn||u.username===cn));
        if(!coord)return;
        if(!ns[coord.id])ns[coord.id]=[];
        const dayVal=r['اليوم']||r['dayOfWeek']||'';
        const dayIdx=DAYS.indexOf(String(dayVal).trim());
        ns[coord.id].push({id:uid(),customerName:String(r['اسم العميل']||r['العميل']||'').trim(),dayOfWeek:dayIdx>=0?String(dayIdx):String(dayVal),visitTime:String(r['وقت الزيارة']||r['الوقت']||'')});
        cnt++;
      });
      update('schedule',ns);setMsg(`✅ تم رفع ${cnt} زيارة — الجدول محفوظ دائماً`);
    }catch(err){setMsg('❌ '+err.message);}
    setLoading(false);e.target.value='';
  };

  const addEntry=()=>{
    if(!selCoord||!form.customerName.trim()){setMsg('❌ اختر منسقاً وأدخل اسم العميل');return;}
    const ns={...data.schedule};if(!ns[selCoord])ns[selCoord]=[];
    ns[selCoord]=[...ns[selCoord],{id:uid(),...form,customerName:form.customerName.trim()}];
    update('schedule',ns);setForm({customerName:'',dayOfWeek:'0',visitTime:''});setMsg('✅ تمت إضافة الزيارة');setTimeout(()=>setMsg(''),3000);
  };

  const del=(cId,eId)=>{const ns={...data.schedule};ns[cId]=(ns[cId]||[]).filter(e=>e.id!==eId);update('schedule',ns);};
  const clear=cId=>{if(!confirm('مسح جدول هذا المنسق؟'))return;const ns={...data.schedule};delete ns[cId];update('schedule',ns);};

  return(
    <>
      <div style={{...G.card,marginBottom:12}}>
        <div style={{color:'#94a3b8',fontWeight:600,fontSize:14,textAlign:'right',marginBottom:8}}>رفع جدول الزيارات (Excel)</div>
        <div style={{background:'#f1f5f9',borderRadius:8,padding:'8px 12px',marginBottom:10,border:'1px solid #e2e8f0'}}>
          {['اسم المنسق','اسم العميل','اليوم (الأحد/الاثنين...إلخ)','وقت الزيارة (اختياري)'].map(c=><div key={c} style={{color:'#2563eb',fontSize:11,textAlign:'right'}}>• {c}</div>)}
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={uploadExcel} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current?.click()} disabled={loading} style={{...G.btn('#7c3aed'),opacity:loading?0.6:1}}>
          {loading?'⏳ جاري الرفع...':'📂 رفع جدول Excel'}
        </button>
        <Msg text={msg} onClear={()=>setMsg('')}/>
      </div>

      <div style={{...G.card,marginBottom:14}}>
        <div style={{color:'#2563eb',fontSize:13,fontWeight:700,marginBottom:10,textAlign:'right'}}>إضافة يدوية</div>
        <div style={{marginBottom:8}}>
          <label style={G.lbl}>المنسق</label>
          <select style={G.inp} value={selCoord} onChange={e=>setSelCoord(e.target.value)}>
            <option value=''>— اختر المنسق —</option>
            {coords.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
          </select>
        </div>
        <div style={{marginBottom:8}}>
          <label style={G.lbl}>اسم العميل</label>
          <input style={G.inp} value={form.customerName} onChange={e=>setForm({...form,customerName:e.target.value})} placeholder="اسم العميل"/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
          <div>
            <label style={G.lbl}>اليوم</label>
            <select style={G.inp} value={form.dayOfWeek} onChange={e=>setForm({...form,dayOfWeek:e.target.value})}>
              {DAYS.map((d,i)=><option key={i} value={String(i)}>{d}</option>)}
            </select>
          </div>
          <div>
            <label style={G.lbl}>الوقت</label>
            <input type="time" style={G.inp} value={form.visitTime} onChange={e=>setForm({...form,visitTime:e.target.value})}/>
          </div>
        </div>
        <button onClick={addEntry} style={G.btn('#2563eb')}>+ إضافة للجدول</button>
      </div>

      {coords.map(coord=>{
        const sch=data.schedule[coord.id]||[];
        const byDay=DAYS.reduce((acc,d,i)=>{acc[i]=sch.filter(e=>String(e.dayOfWeek)===String(i));return acc;},{});
        return(
          <div key={coord.id} style={{...G.card,marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8,paddingBottom:8,borderBottom:'1px solid #e2e8f0'}}>
              <button onClick={()=>clear(coord.id)} style={G.bsm('rgba(239,68,68,.12)','#dc2626')}>مسح الكل</button>
              <div style={{textAlign:'right'}}>
                <div style={{color:'#1e293b',fontWeight:700}}>{coord.name}</div>
                <div style={{color:'#2563eb',fontSize:12}}>{sch.length} زيارة دائمة · {coord.jobTitle||'منسق'}</div>
              </div>
            </div>
            {DAYS.map((dayName,dayIdx)=>{
              const entries=byDay[dayIdx]||[];
              if(!entries.length)return null;
              return(
                <div key={dayIdx} style={{marginBottom:8}}>
                  <div style={{color:'#2563eb',fontSize:12,fontWeight:600,textAlign:'right',marginBottom:4}}>{dayName}</div>
                  {entries.map(e=>(
                    <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',background:'rgba(0,0,0,.02)',borderRadius:8,marginBottom:3}}>
                      <button onClick={()=>del(coord.id,e.id)} style={{background:'none',border:'none',color:'#ef4444',cursor:'pointer',fontSize:16,lineHeight:1}}>×</button>
                      <div style={{textAlign:'right',flex:1}}>
                        <span style={{color:'#1e293b',fontSize:13}}>{e.customerName}</span>
                        {e.visitTime&&<span style={{color:'#64748b',fontSize:11,marginRight:8}}>🕐 {e.visitTime}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              );
            })}
            {sch.length===0&&<div style={{color:'#94a3b8',fontSize:12,textAlign:'center',padding:8}}>لا توجد زيارات</div>}
          </div>
        );
      })}
      {coords.length===0&&<Empty icon="📅" text="لا يوجد منسقون — أضفهم من إدارة المستخدمين"/>}
    </>
  );
}

function OrdersView({data,adminView}){
  const [f,setF]=useState('all');const [q,setQ]=useState('');

  if(f!=='all')list=list.filter(o=>o.status===f);

  const chips=[{k:'all',l:'الكل'},{k:ST.PENDING,l:'لم يبدأ'},{k:ST.IN_DELIVERY,l:'قيد التسليم'},{k:ST.DELIVERED,l:'تم التسليم'},{k:ST.FAILED,l:'لم تُسلَّم'}];
  return(

      {list.map(o=>(
        <div key={o.id} style={{...G.card,borderRight:`3px solid ${SC[o.status]?.dot||'#334155'}`}}>

            <Badge status={o.status}/>
            <div style={{textAlign:'right'}}>
              <div style={{color:'#1e293b',fontWeight:600}}>{o.customerName}</div>
              <div style={{color:'#64748b',fontSize:12}}>#{o.orderNum} · {o.region}{adminView?` · ${o.distributorName}`:''}</div>
              <div style={{color:'#cbd5e1',fontSize:11}}>{o.uploadDate}</div>

}

      map[v.customerName].visits.push(v);

  // Customer detail: all visits + photos

    <>

                <div style={{color:'#64748b',fontSize:12}}>المنسق: {p.coordName} · {p.requestedAt}</div>
                <div style={{color:'#dc2626',fontSize:12,marginTop:4}}>⚠️ الطلبية لم تُسلَّم بعد — المنسق يطلب الإذن للزيارة</div>
                {p.reason&&<div style={{color:'#94a3b8',fontSize:12,marginTop:4}}>السبب: {p.reason}</div>}
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>review(p.id,false)} style={{...G.btn('rgba(239,68,68,.15)','#dc2626'),flex:1,padding:'9px',fontSize:13}}>✕ رفض</button>
                <button onClick={()=>review(p.id,true)}  style={{...G.btn('rgba(34,197,94,.15)','#16a34a'),flex:1,padding:'9px',fontSize:13}}>✓ موافقة</button>
              </div>
            </div>
          ))}
        </>
      )}
      {done.length>0&&(
        <>
          <div style={{color:'#64748b',fontSize:13,fontWeight:700,marginTop:14,marginBottom:8,textAlign:'right'}}>تمت مراجعتها ({done.length})</div>
          {done.map(p=>(
            <div key={p.id} style={{...G.card,borderRight:`3px solid ${p.status==='approved'?'#22c55e':'#ef4444'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{color:p.status==='approved'?'#16a34a':'#dc2626',fontSize:12,fontWeight:700}}>{p.status==='approved'?'✓ موافق':'✕ مرفوض'}</span>
                <div style={{textAlign:'right'}}>
                  <div style={{color:'#1e293b',fontWeight:600}}>{p.customerName}</div>
                  <div style={{color:'#64748b',fontSize:11}}>{p.coordName} · {p.requestedAt}</div>
                </div>
              </div>
            </div>
          ))}
        </>
      )}
      {list.length===0&&<Empty icon="⚡" text="لا توجد طلبات إذن"/>}
    </>
  );
}

function AlertsMgmt({data,update,user}){
  const [msg,setMsg]=useState('');const [target,setTarget]=useState('all');const [sent,setSent]=useState('');
  const send=()=>{
    if(!msg.trim()){setSent('❌ اكتب نص التنبيه');return;}
    const n=nowTs();
    update('alerts',[...data.alerts,{id:uid(),message:msg.trim(),target,createdAt:`${n.date} ${n.time}`,createdBy:user.name,readBy:[]}]);
    setMsg('');setSent('✅ تم إرسال التنبيه');setTimeout(()=>setSent(''),3000);
  };
  const tAR={all:'الجميع',distributor:'الموزعون',coordinator:'المنسقون'};
  return(
    <>
      <div style={{...G.card,marginBottom:14}}>
        <div style={{color:'#dc2626',fontSize:14,fontWeight:700,textAlign:'right',marginBottom:10}}>🚨 إرسال تنبيه عاجل</div>
        <div style={{marginBottom:8}}>
          <label style={G.lbl}>إرسال إلى</label>
          <select style={G.inp} value={target} onChange={e=>setTarget(e.target.value)}>
            <option value="all">الجميع</option>
            <option value="distributor">الموزعون فقط</option>
            <option value="coordinator">المنسقون فقط</option>
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <label style={G.lbl}>نص التنبيه</label>
          <textarea style={{...G.inp,minHeight:88,resize:'vertical'}} placeholder="اكتب التنبيه..." value={msg} onChange={e=>setMsg(e.target.value)}/>
        </div>
        <Msg text={sent}/>
        <button onClick={send} style={G.btn('#b91c1c')}>🚨 إرسال</button>
      </div>
      {[...data.alerts].reverse().map(a=>(

// ── تقرير نهاية اليوم ──────────────────────────────────
function EodReport({data,update,user}){
  const today=nowTs();

  // 1. طلبيات اليوم لم تُسلَّم
  const todayOrders=data.orders.filter(o=>o.uploadDateISO===today.iso);
  const undelivered=todayOrders.filter(o=>o.status!==ST.DELIVERED);
  const delivered  =todayOrders.filter(o=>o.status===ST.DELIVERED);

  // 2. زيارات المنسقين الفائتة اليوم
  const coords=data.users.filter(u=>u.role===R.COORDINATOR);
  const coordStats=coords.map(coord=>{
    const todaySch=(data.schedule[coord.id]||[]).filter(e=>String(e.dayOfWeek)===String(today.dayIndex));
    const todayVis=data.visits.filter(v=>v.coordId===coord.id&&v.date===today.date);
    const done   =todaySch.filter(e=>todayVis.find(v=>v.scheduleId===e.id));
    const missed =todaySch.filter(e=>!todayVis.find(v=>v.scheduleId===e.id));
    return{coord,todaySch,done,missed};
  }).filter(x=>x.todaySch.length>0);

  const totalMissed=coordStats.reduce((s,x)=>s+x.missed.length,0);
  const totalDoneV =coordStats.reduce((s,x)=>s+x.done.length,0);

  // Manual trigger: send end-of-day alert now
  const sendEodAlert=()=>{
    const lines=[];
    if(undelivered.length>0){
      lines.push(`📦 طلبيات لم تُسلَّم (${undelivered.length}):`);
      undelivered.forEach(o=>lines.push(`  • ${o.customerName} — ${STAR[o.status]} (${o.distributorName})`));
    }
    if(totalMissed>0){
      lines.push(`\n📅 زيارات فائتة (${totalMissed}):`);
      coordStats.filter(x=>x.missed.length>0).forEach(x=>{
        lines.push(`  • ${x.coord.name}: ${x.missed.map(e=>e.customerName).join('، ')}`);
      });
    }
    if(!lines.length){lines.push('✅ لا توجد طلبيات متأخرة ولا زيارات فائتة اليوم.');}
    const msg=`تقرير نهاية اليوم — ${today.date}\n${lines.join('\n')}`;
    const n=nowTs();
    update('alerts',[...data.alerts,{id:uid(),message:msg,target:'all',createdAt:`${n.date} ${n.time}`,createdISO:today.iso,createdBy:'المدير',autoType:'eod_manual',readBy:[],isSystem:false}]);
  };

  return(
    <>
      {/* Summary stats */}
      <StatGrid stats={[
        {label:'طلبيات اليوم',    value:todayOrders.length,                 color:'#1d4ed8',icon:'📦'},
        {label:'تم التسليم',      value:delivered.length,                    color:'#15803d',icon:'✅'},
        {label:'لم تُسلَّم',     value:undelivered.length,                  color:undelivered.length?'#b91c1c':'#dbeafe',icon:'❌'},
        {label:'زيارات فائتة',   value:totalMissed,                         color:totalMissed?'#b45309':'#dbeafe',icon:'⚠️'},
      ]}/>

      {/* Send report button */}
      <button onClick={sendEodAlert} style={{...G.btn('#b91c1c'),marginBottom:14,fontSize:13}}>
        📤 إرسال تقرير نهاية اليوم للموزعين والمنسقين
      </button>

      {/* Undelivered orders */}
      <div style={{color:undelivered.length?'#dc2626':'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>
        📦 طلبيات لم تُسلَّم اليوم ({undelivered.length})
      </div>
      {undelivered.length===0
        ?<div style={{...G.card,textAlign:'center',color:'#64748b',fontSize:13,marginBottom:14,padding:14}}>✅ جميع طلبيات اليوم تم تسليمها</div>
        :undelivered.map(o=>(
          <div key={o.id} style={{...G.card,borderRight:`3px solid ${SC[o.status]?.dot||'#ef4444'}`,marginBottom:8}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <Badge status={o.status}/>
              <div style={{textAlign:'right'}}>
                <div style={{color:'#1e293b',fontWeight:600}}>{o.customerName}</div>
                <div style={{color:'#64748b',fontSize:12}}>#{o.orderNum} · {o.distributorName}</div>
              </div>
            </div>
          </div>
        ))
      }

      {/* Missed visits per coordinator */}
      <div style={{color:totalMissed?'#d97706':'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginTop:6,marginBottom:8}}>
        📅 زيارات فائتة اليوم ({totalMissed})
      </div>
      {coordStats.length===0&&<div style={{...G.card,textAlign:'center',color:'#64748b',fontSize:13,padding:14}}>لا توجد زيارات مجدولة لأي منسق اليوم</div>}
      {coordStats.map(({coord,todaySch,done,missed})=>{
        const pct=todaySch.length>0?Math.round(done.length/todaySch.length*100):100;

            {missed.map(e=>(

                <span style={{color:'#dc2626',fontSize:11}}>❌ فائتة</span>

              </div>
            ))}
            {done.map(e=>(

                <span style={{color:'#16a34a',fontSize:11}}>✅ تمت</span>
                <span style={{color:'#166534',fontSize:12}}>{e.customerName}</span>
              </div>
            ))}

        );
      })}

      {/* System alerts log */}
      {data.alerts.filter(a=>a.isSystem).length>0&&(
        <>
          <div style={{color:'#64748b',fontSize:13,fontWeight:700,textAlign:'right',marginTop:14,marginBottom:8}}>📋 سجل التنبيهات التلقائية</div>

            <div key={a.id} style={{...G.card,borderRight:'3px solid #ef4444',marginBottom:8}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <button onClick={()=>update('alerts',data.alerts.filter(x=>x.id!==a.id))} style={G.bsm('rgba(239,68,68,.1)','#dc2626')}>حذف</button>

                  <div style={{color:'#fca5a5',fontSize:10,marginBottom:3}}>{a.createdAt} · تلقائي</div>

  return coords.map(coord=>{
    const todaySch=(data.schedule[coord.id]||[]).filter(e=>String(e.dayOfWeek)===String(today.dayIndex));
    const allVis=data.visits.filter(v=>v.coordId===coord.id);
    const todayVis=allVis.filter(v=>v.date===today.date);

    const undone=todaySch.filter(e=>!todayVis.find(v=>v.scheduleId===e.id));

          <div style={{textAlign:'right'}}>
            <div style={{color:'#1e293b',fontWeight:700}}>{coord.name}</div>

        </div>
        {todaySch.length>0&&<div style={{background:'#f0f4f8',borderRadius:20,height:7,marginBottom:10,overflow:'hidden'}}><div style={{width:`${pct}%`,height:'100%',background:pct>=80?'#22c55e':pct>=50?'#d97706':'#ef4444',borderRadius:20}}/></div>}

}

function UploadOrders({data,update}){
  const [msg,setMsg]=useState('');const [loading,setLoading]=useState(false);
  const fileRef=useRef();
  const handle=async e=>{
    const f=e.target.files[0];if(!f)return;setLoading(true);setMsg('');
    try{
      const wb=XLSX.read(await f.arrayBuffer(),{type:'array'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      if(!rows.length){setMsg('❌ الملف فارغ');setLoading(false);return;}
      const today=nowTs();
      const news=rows.map(r=>({
        id:uid(),
        customerName:   String(r['اسم العميل']  ||r['العميل']   ||'').trim(),
        region:         String(r['المنطقة']      ||r['منطقة']    ||'').trim(),
        orderNum:       String(r['رقم الطلبية']  ||r['رقم الطلب']||uid()).trim(),
        distributorName:String(r['اسم الموزع المسؤول']||r['الموزع']||'').trim(),
        status:ST.WAREHOUSE,statusHistory:[{status:ST.WAREHOUSE,time:today.time,by:'المحاسبة'}],note:'',
        uploadDate:today.date,uploadDateISO:today.iso,
      })).filter(o=>o.customerName);
      update('orders',[...data.orders,...news]);
      setMsg(`✅ تم رفع ${news.length} طلبية — في انتظار أمين المستودع لتحميلها`);
    }catch(err){setMsg('❌ خطأ: '+err.message);}
    setLoading(false);e.target.value='';
  };
  return(
    <>
      <div style={{...G.card,marginBottom:12}}>
        <div style={{color:'#94a3b8',fontWeight:600,fontSize:14,textAlign:'right',marginBottom:8}}>رفع طلبيات اليوم</div>
        <div style={{background:'#f1f5f9',borderRadius:8,padding:'8px 12px',marginBottom:10,border:'1px solid #e2e8f0'}}>
          {['اسم العميل','المنطقة','رقم الطلبية','اسم الموزع المسؤول'].map(c=><div key={c} style={{color:'#2563eb',fontSize:12,textAlign:'right'}}>• {c}</div>)}
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handle} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current?.click()} disabled={loading} style={{...G.btn(),opacity:loading?0.6:1}}>
          {loading?'⏳ جاري الرفع...':'📂 اختر ملف Excel'}
        </button>
        <Msg text={msg} onClear={()=>setMsg('')}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <button onClick={()=>{if(confirm('مسح جميع الطلبيات؟'))update('orders',[]);}} style={G.bsm('rgba(239,68,68,.12)','#dc2626')}>🗑️ مسح الكل</button>
        <span style={{color:'#64748b',fontSize:13}}>{data.orders.length} طلبية</span>
      </div>
    </>
  );
}

function DistributorApp({user,data,update,onLogout,dismissAlert,isOnline}){
  const [sel,setSel]=useState(null);
  const [sortGps,setSortGps]=useState(false);
  const [myPos,setMyPos]=useState(null);
  const [f,setF]=useState('all');
  const [q,setQ]=useState('');

  // Only show orders that have been released by warehouse (not warehouse_pending)
  const mine=data.orders.filter(o=>
    o.distributorName?.trim().toLowerCase()===user.name?.trim().toLowerCase()&&
    o.status!==ST.WAREHOUSE
  );

  // ── Broadcast distributor location every 60s → Supabase ──
  useEffect(()=>{
    if(!supa)return;
    const broadcast=()=>{
      if(!navigator.geolocation)return;
      navigator.geolocation.getCurrentPosition(function(pos){
        supa.from('gmd_dist_pos').upsert({
          user_id:user.id,name:user.name,
          lat:pos.coords.latitude,lng:pos.coords.longitude,
          updated_ts:new Date().toISOString()
        },{onConflict:'user_id'}).then(function(){}).catch(function(e){console.warn('dist_pos error:',e);});
      },null,{enableHighAccuracy:false,timeout:8000,maximumAge:30000});
    };
    broadcast();
    const iv=setInterval(broadcast,60000);
    return()=>clearInterval(iv);
  },[]);

  // إشعارات التسليم تعتمد على Realtime في App

  const doSort=()=>getGps(pos=>{setMyPos({lat:pos.coords.latitude,lng:pos.coords.longitude});setSortGps(true);},()=>alert('تعذّر الحصول على موقعك'));

  const list=useMemo(()=>{
    let L=[...mine];
    if(f!=='all')L=L.filter(o=>o.status===f);
    if(q)L=L.filter(o=>o.customerName?.includes(q)||o.region?.includes(q)||o.orderNum?.includes(q));
    if(sortGps&&myPos){
      L.sort((a,b)=>{
        const ca=data.customers.find(c=>c.name===a.customerName);
        const cb=data.customers.find(c=>c.name===b.customerName);
        const da=ca?.lat&&ca?.lng?mDist(myPos.lat,myPos.lng,ca.lat,ca.lng):Infinity;
        const db=cb?.lat&&cb?.lng?mDist(myPos.lat,myPos.lng,cb.lat,cb.lng):Infinity;
        return da-db;
      });
    }
    return L;
  },[mine,f,q,sortGps,myPos,data.customers]);

  if(sel){
    const live=data.orders.find(o=>o.id===sel.id)||sel;
    const cust=data.customers.find(c=>c.name===live.customerName);
    // Distributor must pass verification (no GPS 50m required, just identity check)
    if(!sel._verified){
      return <GpsGate
        customer={cust||{name:live.customerName,region:live.region,sysNum:''}}
        onOk={()=>setSel({...live,_verified:true})}
        onBack={()=>setSel(null)}
        user={user}
        requireGps={false}
      />;
    }
    return <DistDetail order={live} data={data} update={update} user={user} onBack={()=>setSel(null)}/>;
  }

  const chips=[{k:'all',l:'الكل'},{k:ST.PENDING,l:'لم يبدأ'},{k:ST.IN_DELIVERY,l:'قيد التسليم'},{k:ST.DELIVERED,l:'تم التسليم'},{k:ST.FAILED,l:'لم تُسلَّم'}];

  return(
    <>
      <Header user={user} onLogout={onLogout} title="طلبياتي" isOnline={isOnline!==false}/>
      <AlertBanner alerts={data.alerts} userId={user.id} role={R.DISTRIBUTOR} onDismiss={dismissAlert}/>
      <div style={G.sec}>
        <StatGrid stats={[
          {label:'الكل',        value:mine.length,color:'#1d4ed8',icon:'📦'},
          {label:'قيد التسليم',value:mine.filter(o=>o.status===ST.IN_DELIVERY).length,color:'#b45309',icon:'🔄'},
          {label:'تم التسليم', value:mine.filter(o=>o.status===ST.DELIVERED).length,color:'#15803d',icon:'✅'},
          {label:'لم تُسلَّم', value:mine.filter(o=>o.status===ST.FAILED).length,color:'#b91c1c',icon:'❌'},
        ]}/>

        {/* KPI bar for distributor */}
        {mine.length>0&&(()=>{
          const dPct=Math.round(mine.filter(o=>o.status===ST.DELIVERED).length/mine.length*100);
          const rem=mine.filter(o=>o.status!==ST.DELIVERED&&o.status!==ST.FAILED).length;
          const eta=new Date();eta.setMinutes(eta.getMinutes()+rem*20);
          const etaS=eta.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
          return(
            <div style={{...G.card,marginBottom:10,background:'linear-gradient(135deg,#eff6ff,#f0f4f8)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{color:dPct>=100?'#16a34a':dPct>=60?'#d97706':'#dc2626',fontSize:22,fontWeight:800}}>{dPct}%</div>
                <div style={{textAlign:'right'}}>
                  <div style={{color:'#1e293b',fontSize:13,fontWeight:700}}>سُلِّم {mine.filter(o=>o.status===ST.DELIVERED).length} من {mine.length}</div>
                  {rem>0&&<div style={{color:'#2563eb',fontSize:11}}>الوقت المتوقع: {etaS}</div>}
                  {rem===0&&<div style={{color:'#16a34a',fontSize:11}}>انتهيت من كل الطلبيات!</div>}
                </div>
              </div>
              <div style={{background:'#f0f4f8',borderRadius:20,height:7,overflow:'hidden'}}>
                <div style={{width:dPct+'%',height:'100%',background:dPct>=100?'#22c55e':dPct>=60?'#d97706':'#ef4444',borderRadius:20,transition:'width .5s'}}/>
              </div>
            </div>
          );
        })()}
        {data.settings?.qrEnabled
          ? <div style={{...G.card,marginBottom:10,textAlign:'center',color:'#2563eb',fontSize:13}}>📷 مسح QR Code — للتفعيل تحتاج جهاز يدعم BarcodeDetector API</div>
          : <div style={{background:'rgba(100,116,139,.05)',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 14px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{color:'#475569',fontSize:12}}>قريباً</span>
              <span style={{color:'#475569',fontSize:12}}>📷 مسح QR — غير مفعّل حالياً</span>
            </div>
        }
        <button onClick={doSort} style={{...G.btn(sortGps?'#15803d':'rgba(37,99,235,.15)'),border:`1.5px solid ${sortGps?'#22c55e':'#1e293b'}`,marginBottom:10,fontSize:13,padding:'10px',color:sortGps?'white':'#2563eb'}}>
          {sortGps?'✅ مرتبة بالأقرب إليك':'📍 رتّب حسب الأقرب'}
        </button>

        <input style={{...G.inp,marginBottom:10}} placeholder="🔍 بحث..." value={q} onChange={e=>setQ(e.target.value)}/>
        <ChipBar chips={chips} active={f} onChange={setF}/>

        {list.map((o,i)=>{
          const cust=data.customers.find(c=>c.name===o.customerName);
          const dm=sortGps&&myPos&&cust?.lat&&cust?.lng?Math.round(mDist(myPos.lat,myPos.lng,cust.lat,cust.lng)):null;
          return(
            <div key={o.id} onClick={()=>setSel(o)} style={{...G.card,cursor:'pointer',borderRight:`3px solid ${SC[o.status]?.dot||'#334155'}`}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{color:'#cbd5e1',fontSize:20}}>›</span>
                <div style={{textAlign:'right',flex:1}}>
                  {sortGps&&<div style={{color:'#64748b',fontSize:11,marginBottom:2}}>#{i+1} {dm!=null?`· 📍 ${dm}م`:''}</div>}
                  <div style={{color:'#1e293b',fontWeight:600,fontSize:15}}>{o.customerName}</div>
                  <div style={{color:'#64748b',fontSize:12}}>#{o.orderNum} · {o.region}</div>
                  {cust?.sysNum&&<div style={{color:'#cbd5e1',fontSize:11}}>رقم النظام: {cust.sysNum}</div>}
                  <div style={{marginTop:5}}><Badge status={o.status}/></div>
                </div>
              </div>
            </div>
          );
        })}
        {list.length===0&&<Empty icon="📦" text={mine.length===0?'لا توجد طلبيات مسندة إليك':'لا توجد نتائج'}/>}
      </div>
    </>
  );
}

function DistDetail({order,data,update,user,onBack}){
  const [status,setStatus]=useState(order.status);
  const [note,setNote]=useState(order.note||'');
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);
  const [showGpsCapture,setShowGpsCapture]=useState(false);
  const [gpsCapturing,setGpsCapturing]=useState(false);
  const [showSig,setShowSig]=useState(false);
  const [sigData,setSigData]=useState(null);
  const sigCanvasRef=useRef(null);
  const sigDrawing=useRef(false);
  const sigLastPos=useRef(null);

  const cust=data.customers.find(c=>c.name===order.customerName);
  const hasGps=!!(cust?.lat&&cust?.lng);
  const statuses=[
    {k:ST.PENDING,    l:'لم يبدأ',     i:'⏳'},
    {k:ST.IN_DELIVERY,l:'قيد التسليم', i:'🚚'},
    {k:ST.DELIVERED,  l:'تم التسليم',  i:'✅'},
    {k:ST.FAILED,     l:'لم تُسلَّم',  i:'❌'},
  ];

  // ── Capture GPS for customer without coordinates ──
  const captureCustomerGps=()=>{
    setGpsCapturing(true);
    getGps(pos=>{
      const lat=parseFloat(pos.coords.latitude.toFixed(6));
      const lng=parseFloat(pos.coords.longitude.toFixed(6));
      // Update customer in customers list
      const updatedCusts=data.customers.map(c=>
        c.name===order.customerName?{...c,lat,lng}:c
      );
      update('customers',updatedCusts);
      window.auditLogDB(user.id,user.name,user.role,'gps_capture',order.customerName+': '+lat+','+lng);
      setGpsCapturing(false);
      setShowGpsCapture(false);
      alert('✅ تم حفظ موقع '+order.customerName+' بنجاح!');
    },()=>{
      setGpsCapturing(false);
      alert('تعذّر الحصول على الموقع. فعّل GPS وأعد المحاولة.');
    },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
  };

  // ── Signature pad helpers ──
  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };
  const sigStart=e=>{
    e.preventDefault();sigDrawing.current=true;
    const pos=getPos(e,sigCanvasRef.current);sigLastPos.current=pos;
    const ctx=sigCanvasRef.current.getContext('2d');
    ctx.beginPath();ctx.arc(pos.x,pos.y,1.5,0,Math.PI*2);ctx.fillStyle='#1d4ed8';ctx.fill();
  };
  const sigMove=e=>{
    if(!sigDrawing.current)return;e.preventDefault();
    const pos=getPos(e,sigCanvasRef.current);
    const ctx=sigCanvasRef.current.getContext('2d');
    ctx.beginPath();ctx.moveTo(sigLastPos.current.x,sigLastPos.current.y);
    ctx.lineTo(pos.x,pos.y);ctx.strokeStyle='#1d4ed8';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
    sigLastPos.current=pos;
  };
  const sigEnd=()=>{sigDrawing.current=false;};
  const clearSig=()=>{
    const ctx=sigCanvasRef.current.getContext('2d');
    ctx.clearRect(0,0,sigCanvasRef.current.width,sigCanvasRef.current.height);
    setSigData(null);
  };
  const saveSig=()=>{
    setSigData(sigCanvasRef.current.toDataURL('image/png'));
    setShowSig(false);
  };

  const save=()=>{
    // If delivering: require signature if setting enabled
    if(status===ST.DELIVERED&&data.settings?.signatureEnabled&&!sigData){
      setShowSig(true);
      return;
    }
    setSaving(true);
    const n=nowTs();
    update('orders',data.orders.map(o=>o.id===order.id?{...o,status,note,
      statusHistory:[...(o.statusHistory||[]),{status,time:n.date+' '+n.time,by:user.name}],
      deliverySig:sigData||null,
    }:o));
    window.auditLogDB(user.id,user.name,user.role,'order_update',order.customerName+': '+STAR[status]);
    if(status===ST.DELIVERED&&supa){
      // إشعار تلقائي عبر Supabase Realtime
      supa.from('gmd_alerts').insert([{
        id:uid(),
        message:'✅ تم تسليم بضاعة للعميل '+order.customerName+' — يرجى زيارته لتنسيق الأصناف الجديدة',
        target:'coordinator',
        created_at:n.date+' '+n.time,created_iso:n.iso,
        created_by:user.name,read_by:[],is_system:false
      }]).then(function(){}).catch(function(e){console.warn('alert insert error:',e);});
    }
    setSaving(false);setDone(true);setTimeout(onBack,900);
  };

  if(done)return(
    <div style={{...G.page,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',textAlign:'center',padding:24,minHeight:'100vh'}}>
      <div style={{fontSize:64,marginBottom:12}}>✅</div>
      <div style={{color:'#16a34a',fontSize:20,fontWeight:800}}>تم الحفظ!</div>
      {sigData&&<div style={{color:'#2563eb',fontSize:13,marginTop:6}}>✍️ التوقيع مُرفق</div>}
    </div>
  );

  // Signature overlay
  if(showSig)return(
    <div style={{...G.page,minHeight:'100vh'}}>
      <Header user={user} onBack={()=>setShowSig(false)} title="توقيع العميل"/>
      <div style={G.sec}>
        <div style={{...G.card,marginBottom:14,background:'rgba(37,99,235,.08)',border:'1px solid rgba(37,99,235,.25)'}}>
          <div style={{color:'#2563eb',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:4}}>✍️ توقيع العميل مطلوب</div>
          <div style={{color:'#64748b',fontSize:12,textAlign:'right'}}>اطلب من العميل {order.customerName} التوقيع بإصبعه في المساحة أدناه</div>
        </div>
        <div style={{background:'white',borderRadius:12,overflow:'hidden',border:'2px solid #e2e8f0',touchAction:'none',marginBottom:12}}>
          <canvas ref={sigCanvasRef} width={460} height={200}
            style={{display:'block',width:'100%',cursor:'crosshair',touchAction:'none'}}
            onMouseDown={sigStart} onMouseMove={sigMove} onMouseUp={sigEnd} onMouseLeave={sigEnd}
            onTouchStart={sigStart} onTouchMove={sigMove} onTouchEnd={sigEnd}
          />
        </div>
        <div style={{color:'#64748b',fontSize:11,textAlign:'center',marginBottom:12}}>وقّع في المساحة البيضاء أعلاه</div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={clearSig} style={{...G.btn('rgba(245,158,11,.15)','#d97706'),flex:1,padding:'11px',fontSize:13}}>مسح</button>
          <button onClick={saveSig} style={{...G.btn('#15803d'),flex:2,padding:'11px',fontSize:13}}>✓ حفظ التوقيع</button>
        </div>
      </div>
    </div>
  );

  return(
    <>
      <Header user={user} onBack={onBack} title="تفاصيل الطلبية"/>
      <div style={G.sec}>

        {/* Customer info + GPS warning */}
        <div style={{...G.card,borderRight:'3px solid '+(SC[order.status]?.dot||'#334155'),marginBottom:14}}>
          <div style={{color:'#1e293b',fontSize:17,fontWeight:700,textAlign:'right'}}>{order.customerName}</div>
          {cust?.sysNum&&<div style={{color:'#64748b',fontSize:12,textAlign:'right',marginTop:2}}>رقم النظام: {cust.sysNum} · {cust.region}</div>}
          <div style={{color:'#64748b',fontSize:12,textAlign:'right'}}>#{order.orderNum}</div>
          <div style={{marginTop:6}}><Badge status={order.status}/></div>
        </div>

        {/* GPS missing warning */}
        {!hasGps&&(
          <div style={{...G.card,marginBottom:14,background:'rgba(239,68,68,.08)',border:'1px solid rgba(239,68,68,.3)'}}>
            <div style={{color:'#dc2626',fontSize:13,fontWeight:700,textAlign:'right',marginBottom:8}}>
              📍 هذا العميل لا يملك إحداثيات GPS
            </div>
            <div style={{color:'#94a3b8',fontSize:12,textAlign:'right',marginBottom:10,lineHeight:1.6}}>
              أنت الآن عند العميل — احفظ موقعه الآن ليتمكن المنسق من التحقق الجغرافي في زياراته القادمة.
            </div>
            {showGpsCapture?(
              <button onClick={captureCustomerGps} disabled={gpsCapturing}
                style={{...G.btn('#15803d'),opacity:gpsCapturing?0.6:1}}>
                {gpsCapturing?'📡 جاري تحديد الموقع...':'📍 احفظ موقع العميل الآن'}
              </button>
            ):(
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setShowGpsCapture(true)} style={{...G.btn('#2563eb'),flex:2,fontSize:13,padding:'10px'}}>
                  📍 تحديد الموقع
                </button>
                <button onClick={()=>setShowGpsCapture(false)} style={{...G.btn('rgba(100,116,139,.15)','#94a3b8'),flex:1,fontSize:13,padding:'10px'}}>
                  تخطي
                </button>
              </div>
            )}
          </div>
        )}

        {/* Signature status */}
        {sigData&&(
          <div style={{background:'rgba(34,197,94,.08)',border:'1px solid rgba(34,197,94,.25)',borderRadius:10,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <button onClick={()=>setSigData(null)} style={G.bsm('rgba(239,68,68,.1)','#dc2626')}>حذف</button>
            <div style={{textAlign:'right'}}>
              <div style={{color:'#16a34a',fontSize:13,fontWeight:700}}>✍️ التوقيع مُسجَّل</div>
              <img src={sigData} alt="sig" style={{height:40,marginTop:4,filter:'invert(1)',opacity:.7}}/>
            </div>
          </div>
        )}

        {/* Status buttons */}
        {statuses.map(s=>{
          const sc=SC[s.k];const active=status===s.k;
          return(
            <button key={s.k} onClick={()=>setStatus(s.k)}
              style={{width:'100%',background:active?sc.light:'#ffffff',border:'2px solid '+(active?sc.dot:'#1e293b'),borderRadius:12,padding:'11px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',marginBottom:8}}>
              <div style={{width:18,height:18,borderRadius:'50%',background:active?sc.dot:'transparent',border:'2px solid '+(active?sc.dot:'#cbd5e1')}}/>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{color:active?sc.text:'#64748b',fontWeight:700,fontSize:14}}>{s.l}</span>
                <span style={{fontSize:20}}>{s.i}</span>
              </div>
            </button>
          );
        })}

        {/* Signature prompt for delivery */}
        {status===ST.DELIVERED&&data.settings?.signatureEnabled&&!sigData&&(
          <div style={{background:'rgba(37,99,235,.08)',border:'1px solid rgba(37,99,235,.25)',borderRadius:10,padding:'10px 14px',marginBottom:12,textAlign:'right'}}>
            <div style={{color:'#2563eb',fontSize:13,marginBottom:6}}>✍️ التوقيع الرقمي مفعّل — سيُطلب عند الحفظ</div>
          </div>
        )}

        <div style={{marginBottom:14,marginTop:8}}>
          <label style={G.lbl}>ملاحظة (اختياري)</label>
          <textarea style={{...G.inp,minHeight:70,resize:'vertical'}} placeholder="أضف ملاحظة..." value={note} onChange={e=>setNote(e.target.value)}/>
        </div>

        <button onClick={save} disabled={saving} style={{...G.btn(),opacity:saving?0.6:1}}>
          {saving?'⏳ جاري الحفظ...':status===ST.DELIVERED&&data.settings?.signatureEnabled&&!sigData?'💾 حفظ + طلب التوقيع':'💾 حفظ الحالة'}
        </button>

        {order.statusHistory?.length>0&&(
          <>
            <div style={{color:'#64748b',fontSize:13,margin:'14px 0 8px',textAlign:'right',fontWeight:600}}>سجل التحديثات</div>
            {[...order.statusHistory].reverse().map((h,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 0',borderBottom:'1px solid #e2e8f0'}}>
                <span style={{color:'#cbd5e1',fontSize:12}}>{h.time}</span><Badge status={h.status}/>
              </div>
            ))}
          </>
        )}
      </div>
    </>
  );
}

// COORDINATOR APP
